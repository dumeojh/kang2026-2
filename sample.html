<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>사건 관계도 분석</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 20px;
        }

        .tab-menu {
            display: flex;
            align-items: flex-end;
            margin-bottom: 20px;
            border-bottom: 2px solid #ccc;
        }

        .tab-button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
            border-radius: 5px 5px 0 0;
            margin-bottom: -2px;
            margin-right: 5px;
        }

        .tab-button.active {
            background-color: #4CAF50;
            color: white;
            border-bottom: 2px solid #4CAF50;
        }

        .load-data-tab {
            margin-left: 15px;
            background-color: #607D8B;
            color: white;
            border-color: #546E7A;
        }

        .load-data-tab.active {
            background-color: #4CAF50;
            border-bottom: 2px solid #4CAF50;
        }

        .tab-content {
            display: none;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 0 5px 5px 5px;
            max-width: 1000px;
        }

        .tab-content.active {
            display: block;
        }

        .input-group {
            margin-bottom: 10px;
        }

        .input-group label {
            display: inline-block;
            width: 110px;
            font-weight: bold;
        }

        .input-group input {
            padding: 8px;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .save-btn,
        .search-btn,
        .load-btn {
            padding: 10px 20px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }

        .cancel-btn {
            padding: 10px 20px;
            background-color: #9E9E9E;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            margin-left: 10px;
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        /* 🟢 정렬 가능한 헤더 스타일 추가 */
        th.sortable {
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
        }

        th.sortable:hover {
            background-color: #45a049;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        .action-btn {
            padding: 5px 10px;
            margin: 2px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            color: white;
        }

        .edit-btn {
            background-color: #FF9800;
        }

        .edit-btn:hover {
            background-color: #F57C00;
        }

        .delete-btn {
            background-color: #F44336;
        }

        .delete-btn:hover {
            background-color: #D32F2F;
        }

        .company-list,
        .event-tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .company-tag {
            background-color: #FFF3E0;
            border: 1px solid #FF9800;
            color: #E65100;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 1px 1px 3px rgba(0, 0, 0, 0.1);
        }

        .root-event-tag {
            background-color: #E8F5E9;
            border: 1px solid #4CAF50;
            color: #2E7D32;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 1px 1px 3px rgba(0, 0, 0, 0.1);
            transition: 0.2s;
        }

        .root-event-tag:hover {
            background-color: #C8E6C9;
            transform: scale(1.05);
        }

        .tree-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            padding: 30px;
            background-color: #f0f4f8;
            border-radius: 12px;
            overflow-x: auto;
        }

        .tree-root {
            background-color: #2196F3;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
            z-index: 2;
            text-align: center;
        }

        .tree-root-desc {
            font-size: 13px;
            font-weight: normal;
            color: #E3F2FD;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #64B5F6;
            max-width: 300px;
            line-height: 1.4;
        }

        .tree-down-arrow {
            font-size: 28px;
            color: #90A4AE;
            margin: 10px 0;
        }

        .tree-branches {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .tree-path {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 20px;
            border: 2px dashed #B0BEC5;
            border-radius: 12px;
            min-width: 120px;
        }

        .tree-node {
            border: 2px solid #4CAF50;
            border-radius: 8px;
            background-color: white;
            font-weight: bold;
            text-align: center;
            width: 100%;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .tree-company {
            border: 2px solid #FF9800;
            background-color: #FFF3E0;
            color: #E65100;
            margin-bottom: 0;
        }

        .path-arrow {
            font-size: 20px;
            color: #B0BEC5;
            margin-bottom: 10px;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div class="tab-menu">
        <button class="tab-button active" onclick="openTab('event-tab', this)">기초사건</button>
        <button class="tab-button" onclick="openTab('company-tab', this); fetchCompanies()">기초회사</button>
        <button class="tab-button" onclick="openTab('occurred-tab', this); fetchRootEvents()">발생사건</button>
        <button class="tab-button load-data-tab" onclick="openTab('all-data-tab', this); fetchAllData()">전체 데이터
            불러오기</button>
    </div>

    <!-- 1. 기초사건 탭 -->
    <div id="event-tab" class="tab-content active">
        <h3>기초사건 기록</h3>
        <p>동일한 기초사건에 대해 여러 갈래의 사건을 계속 추가하면 2차원으로 확장됩니다.</p>
        <div class="input-group">
            <label>기초사건</label>
            <input type="text" id="root-event" placeholder="예: 기초사건1">
        </div>
        <div class="input-group">
            <label>기초사건 설명</label>
            <input type="text" id="root-desc" placeholder="예: 사건의 주요 배경 (선택사항)" style="width: 400px;">
        </div>
        <div class="input-group">
            <label>연결사건 1</label>
            <input type="text" id="link-event-1" placeholder="예: 사건1">
        </div>
        <div class="input-group">
            <label>연결사건 2</label>
            <input type="text" id="link-event-2" placeholder="예: 사건2">
        </div>
        <div class="input-group">
            <label>연결사건 3</label>
            <input type="text" id="link-event-3" placeholder="예: 사건3">
        </div>
        <div class="input-group">
            <label>연결사건 4</label>
            <input type="text" id="link-event-4" placeholder="예: 사건4">
        </div>
        <div class="input-group">
            <label>관련 회사</label>
            <input type="text" id="related-company" placeholder="예: 회사a 또는 없음">
        </div>

        <button class="save-btn" id="main-save-btn" onclick="saveData()">수파베이스에 저장하기</button>
        <button class="cancel-btn" id="cancel-edit-btn" onclick="cancelEdit()">수정 취소</button>
        <p id="save-message" style="color: blue; font-weight: bold;"></p>
    </div>

    <!-- 2. 기초회사 탭 -->
    <div id="company-tab" class="tab-content">
        <h3>저장된 관련 회사 목록</h3>
        <p>데이터베이스에 등록된 전체 회사 리스트입니다. (중복 제외)</p>
        <div id="company-display"></div>
    </div>

    <!-- 3. 발생사건 탭 -->
    <div id="occurred-tab" class="tab-content">
        <h3>사건 관계도 분석 (2D 시각화 & 빈도별 강조)</h3>
        <div class="input-group">
            <label>기초사건 검색</label>
            <input type="text" id="search-query" placeholder="조회할 기초사건을 입력하세요 (예: 기초사건1)">
        </div>
        <button class="search-btn" onclick="searchData()">2D 관계도 보기</button>
        <div id="result-display"></div>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #ccc;">
        <h3>등록된 기초사건 목록</h3>
        <p>아래 사건을 클릭하면 상단 검색창에 입력되어 관계도가 바로 조회됩니다.</p>
        <div id="root-event-list-display"></div>
    </div>

    <!-- 4. 전체 데이터 전용 관리 탭 -->
    <div id="all-data-tab" class="tab-content">
        <h3>저장된 전체 목록 관리</h3>
        <p>항목의 헤더(초록색 배경)를 클릭하면 해당 열을 기준으로 데이터를 오름차순/내림차순 정렬할 수 있습니다.</p>
        <div id="all-data-display"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qdizucrodtfsqcjxadmk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkaXp1Y3JvZHRmc3FjanhhZG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTQ1OTQsImV4cCI6MjA5ODEzMDU5NH0.0ItwcoyDwAMm5VOn5NaLj9QzHzoU53G4AojTddvamPI';

        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentEditId = null;
        let currentDataList = [];

        // 🟢 정렬 상태를 관리하는 변수 (기본은 최신 등록 순서: id 내림차순)
        let sortConfig = { key: 'id', direction: 'desc' };

        function openTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            if (btnElement) btnElement.classList.add('active');
        }

        async function saveData() {
            const root = document.getElementById('root-event').value.trim();
            const rootDesc = document.getElementById('root-desc').value.trim();
            const link1 = document.getElementById('link-event-1').value.trim();
            const link2 = document.getElementById('link-event-2').value.trim();
            const link3 = document.getElementById('link-event-3').value.trim();
            const link4 = document.getElementById('link-event-4').value.trim();
            const company = document.getElementById('related-company').value.trim();

            if (!root) {
                alert("기초사건은 반드시 입력해야 합니다.");
                return;
            }

            const payload = {
                root_event: root, root_desc: rootDesc, link_1: link1, link_2: link2,
                link_3: link3, link_4: link4, company: company
            };

            if (currentEditId) {
                const { error } = await db.from('events').update(payload).eq('id', currentEditId);
                if (error) {
                    console.error('수정 에러:', error);
                    alert("데이터 수정 중 오류가 발생했습니다.");
                    return;
                }

                cancelEdit();
                alert(`'${root}' 데이터가 성공적으로 수정되었습니다.`);

                openTab('all-data-tab', document.querySelector('.load-data-tab'));
                fetchAllData();

            } else {
                const { error } = await db.from('events').insert([payload]);
                if (error) {
                    console.error('저장 에러:', error);
                    alert("데이터 저장 중 오류가 발생했습니다.");
                    return;
                }
                document.getElementById('save-message').innerText = `'${root}' 데이터가 성공적으로 저장되었습니다.`;

                document.getElementById('link-event-1').value = '';
                document.getElementById('link-event-2').value = '';
                document.getElementById('link-event-3').value = '';
                document.getElementById('link-event-4').value = '';
                document.getElementById('related-company').value = '';

                setTimeout(() => { document.getElementById('save-message').innerText = ''; }, 3000);
            }
        }

        // 🟢 데이터베이스에서 전체 데이터를 가져오는 함수
        async function fetchAllData() {
            const displayArea = document.getElementById('all-data-display');
            displayArea.innerHTML = '<p>데이터를 불러오는 중...</p>';

            const { data, error } = await db.from('events').select('*');

            if (error) { displayArea.innerHTML = `<p style="color: red;">오류가 발생했습니다.</p>`; return; }
            if (!data || data.length === 0) { displayArea.innerHTML = '<p style="color: gray;">아직 저장된 데이터가 없습니다.</p>'; return; }

            currentDataList = data;
            renderTable(); // 데이터를 가져온 후 테이블 렌더링 호출
        }

        // 🟢 정렬 버튼 클릭 시 호출되는 함수
        function sortData(key) {
            if (sortConfig.key === key) {
                // 같은 열을 다시 클릭하면 정렬 방향(오름/내림)만 반대로 전환
                sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
            } else {
                // 다른 열을 클릭하면 해당 열 기준 오름차순으로 초기화
                sortConfig.key = key;
                sortConfig.direction = 'asc';
            }
            renderTable(); // 변경된 정렬 기준으로 테이블 다시 그리기
        }

        // 🟢 정렬 아이콘(▲, ▼, ↕)을 반환하는 함수
        function getSortIcon(key) {
            if (sortConfig.key !== key) return '<span style="color:#A5D6A7; font-size:12px;">↕</span>';
            return sortConfig.direction === 'asc' ? '▲' : '▼';
        }

        // 🟢 테이블 화면 생성 전용 함수 (정렬 처리 포함)
        function renderTable() {
            const displayArea = document.getElementById('all-data-display');

            // 자바스크립트 내장 sort()로 데이터 정렬
            const sortedData = [...currentDataList].sort((a, b) => {
                let valA = a[sortConfig.key] || '';
                let valB = b[sortConfig.key] || '';

                // 고유 ID는 숫자로 취급하여 정렬
                if (sortConfig.key === 'id') {
                    return sortConfig.direction === 'asc' ? valA - valB : valB - valA;
                }

                // 문자열은 알파벳/가나다 순으로 정렬
                valA = valA.toString().toLowerCase();
                valB = valB.toString().toLowerCase();

                if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                return 0;
            });

            // 🟢 정렬 함수와 아이콘이 적용된 HTML 헤더 작성
            let htmlString = `<table>
                <tr>
                    <th class="sortable" onclick="sortData('root_event')">기초사건 ${getSortIcon('root_event')}</th>
                    <th class="sortable" onclick="sortData('root_desc')">부연설명 ${getSortIcon('root_desc')}</th>
                    <th class="sortable" onclick="sortData('link_1')">연결사건 1 ${getSortIcon('link_1')}</th>
                    <th class="sortable" onclick="sortData('link_2')">연결사건 2 ${getSortIcon('link_2')}</th>
                    <th class="sortable" onclick="sortData('link_3')">연결사건 3 ${getSortIcon('link_3')}</th>
                    <th class="sortable" onclick="sortData('link_4')">연결사건 4 ${getSortIcon('link_4')}</th>
                    <th class="sortable" onclick="sortData('company')">관련 회사 ${getSortIcon('company')}</th>
                    <th>관리</th>
                </tr>`;

            sortedData.forEach(item => {
                htmlString += `<tr>
                    <td>${item.root_event || ''}</td>
                    <td style="color: #555; font-size: 12px;">${item.root_desc || ''}</td>
                    <td>${item.link_1 || ''}</td>
                    <td>${item.link_2 || ''}</td>
                    <td>${item.link_3 || ''}</td>
                    <td>${item.link_4 || ''}</td>
                    <td>${item.company || ''}</td>
                    <td>
                        <button class="action-btn edit-btn" onclick="prepareEdit(${item.id})">수정</button>
                        <button class="action-btn delete-btn" onclick="deleteData(${item.id})">삭제</button>
                    </td>
                </tr>`;
            });
            htmlString += '</table>';
            displayArea.innerHTML = htmlString;
        }

        function prepareEdit(id) {
            const targetData = currentDataList.find(item => item.id === id);
            if (!targetData) return;

            document.getElementById('root-event').value = targetData.root_event || '';
            document.getElementById('root-desc').value = targetData.root_desc || '';
            document.getElementById('link-event-1').value = targetData.link_1 || '';
            document.getElementById('link-event-2').value = targetData.link_2 || '';
            document.getElementById('link-event-3').value = targetData.link_3 || '';
            document.getElementById('link-event-4').value = targetData.link_4 || '';
            document.getElementById('related-company').value = targetData.company || '';

            currentEditId = id;

            const saveBtn = document.getElementById('main-save-btn');
            saveBtn.innerText = '수정된 내용 저장하기';
            saveBtn.style.backgroundColor = '#FF9800';

            document.getElementById('cancel-edit-btn').style.display = 'inline-block';

            openTab('event-tab', document.querySelectorAll('.tab-button')[0]);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            currentEditId = null;
            const saveBtn = document.getElementById('main-save-btn');
            saveBtn.innerText = '수파베이스에 저장하기';
            saveBtn.style.backgroundColor = '#2196F3';
            document.getElementById('cancel-edit-btn').style.display = 'none';

            document.getElementById('root-event').value = '';
            document.getElementById('root-desc').value = '';
            document.getElementById('link-event-1').value = '';
            document.getElementById('link-event-2').value = '';
            document.getElementById('link-event-3').value = '';
            document.getElementById('link-event-4').value = '';
            document.getElementById('related-company').value = '';
        }

        async function deleteData(id) {
            if (!confirm("정말로 이 데이터를 삭제하시겠습니까?")) return;

            const { error } = await db.from('events').delete().eq('id', id);

            if (error) {
                console.error('삭제 에러:', error);
                alert("삭제 중 오류가 발생했습니다.");
                return;
            }

            fetchAllData();
            if (currentEditId === id) cancelEdit();
        }

        async function fetchCompanies() {
            const displayArea = document.getElementById('company-display');
            displayArea.innerHTML = '<p>회사 리스트를 불러오는 중...</p>';

            const { data, error } = await db.from('events').select('company');
            if (error) { displayArea.innerHTML = `<p style="color: red;">오류가 발생했습니다.</p>`; return; }

            const uniqueCompanies = new Set();
            data.forEach(item => {
                const comp = item.company ? item.company.trim() : '';
                if (comp && comp !== '없음') uniqueCompanies.add(comp);
            });

            if (uniqueCompanies.size === 0) { displayArea.innerHTML = '<p style="color: gray;">저장된 회사 정보가 없습니다.</p>'; return; }

            let htmlString = '<div class="company-list">';
            uniqueCompanies.forEach(company => { htmlString += `<div class="company-tag">${company}</div>`; });
            htmlString += '</div>';
            displayArea.innerHTML = htmlString;
        }

        async function fetchRootEvents() {
            const displayArea = document.getElementById('root-event-list-display');
            displayArea.innerHTML = '<p>기초사건 리스트를 불러오는 중...</p>';

            const { data, error } = await db.from('events').select('root_event');
            if (error) { displayArea.innerHTML = `<p style="color: red;">오류가 발생했습니다.</p>`; return; }

            const uniqueRootEvents = new Set();
            data.forEach(item => {
                const root = item.root_event ? item.root_event.trim() : '';
                if (root) uniqueRootEvents.add(root);
            });

            if (uniqueRootEvents.size === 0) { displayArea.innerHTML = '<p style="color: gray;">저장된 기초사건 정보가 없습니다.</p>'; return; }

            let htmlString = '<div class="event-tag-list">';
            uniqueRootEvents.forEach(root => {
                htmlString += `<div class="root-event-tag" onclick="selectRootEvent('${root}')">${root}</div>`;
            });
            htmlString += '</div>';

            displayArea.innerHTML = htmlString;
        }

        function selectRootEvent(eventName) {
            document.getElementById('search-query').value = eventName;
            searchData();
        }

        async function searchData() {
            const query = document.getElementById('search-query').value.trim();
            const displayArea = document.getElementById('result-display');

            displayArea.innerHTML = '<p>데이터를 분석하는 중...</p>';

            if (!query) {
                alert("검색할 기초사건을 입력해주세요.");
                displayArea.innerHTML = '';
                return;
            }

            const { data, error } = await db.from('events').select('*').eq('root_event', query);

            if (error) {
                console.error('조회 에러:', error);
                displayArea.innerHTML = `<p style="color: red;">오류가 발생했습니다.</p>`;
                return;
            }

            if (!data || data.length === 0) {
                displayArea.innerHTML = `<p style="color: red; margin-top: 20px;">'${query}'에 해당하는 데이터가 없습니다.</p>`;
                return;
            }

            const frequencyMap = {};
            data.forEach(path => {
                const nodes = [path.link_1, path.link_2, path.link_3, path.link_4, path.company];
                nodes.forEach(node => {
                    if (node && node.trim() !== '없음') {
                        const text = node.trim();
                        frequencyMap[text] = (frequencyMap[text] || 0) + 1;
                    }
                });
            });

            function getNodeStyle(text) {
                const count = frequencyMap[text.trim()] || 1;
                const growth = Math.min(count - 1, 6);

                const fontSize = 16 + (growth * 2.5);
                const paddingV = 10 + (growth * 3);
                const paddingH = 20 + (growth * 5);
                const shadow = 2 + growth;

                return `font-size: ${fontSize}px; padding: ${paddingV}px ${paddingH}px; box-shadow: ${shadow}px ${shadow}px ${shadow * 2}px rgba(0,0,0,0.15);`;
            }

            let rootDescription = '';
            const rootItem = data.find(item => item.root_desc && item.root_desc.trim() !== '');
            if (rootItem) {
                rootDescription = rootItem.root_desc.trim();
            }

            let htmlString = '<div class="tree-layout">';
            htmlString += `<div class="tree-root">
                ${query}
                ${rootDescription ? `<div class="tree-root-desc">${rootDescription}</div>` : ''}
            </div>`;
            htmlString += `<div class="tree-down-arrow">⬇</div>`;
            htmlString += '<div class="tree-branches">';

            data.forEach(path => {
                htmlString += '<div class="tree-path">';

                if (path.link_1) htmlString += `<div class="tree-node" style="${getNodeStyle(path.link_1)}">${path.link_1}</div>`;
                if (path.link_2) {
                    htmlString += `<div class="path-arrow">⬇</div>`;
                    htmlString += `<div class="tree-node" style="${getNodeStyle(path.link_2)}">${path.link_2}</div>`;
                }
                if (path.link_3) {
                    htmlString += `<div class="path-arrow">⬇</div>`;
                    htmlString += `<div class="tree-node" style="${getNodeStyle(path.link_3)}">${path.link_3}</div>`;
                }
                if (path.link_4) {
                    htmlString += `<div class="path-arrow">⬇</div>`;
                    htmlString += `<div class="tree-node" style="${getNodeStyle(path.link_4)}">${path.link_4}</div>`;
                }
                if (path.company && path.company !== '없음') {
                    htmlString += `<div class="path-arrow">⬇</div>`;
                    htmlString += `<div class="tree-node tree-company" style="${getNodeStyle(path.company)}">${path.company}</div>`;
                }

                htmlString += '</div>';
            });

            htmlString += '</div></div>';
            displayArea.innerHTML = htmlString;
        }
    </script>
</body>

</html>
