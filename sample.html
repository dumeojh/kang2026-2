<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>전체 사건 관계도 분석</title>
    <!-- 다방향 네트워크 그래프 라이브러리 -->
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 20px;
        }

        .tab-menu {
            display: flex;
            align-items: flex-end;
            margin-bottom: 20px;
            border-bottom: 2px solid #ccc;
        }

        .tab-button {
            padding: 10px 20px;
            cursor: pointer;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
            border-radius: 5px 5px 0 0;
            margin-right: 5px;
        }

        .tab-button.active {
            background-color: #4CAF50;
            color: white;
        }

        .tab-content {
            display: none;
            padding: 20px;
            border: 1px solid #ccc;
            border-top: none;
        }

        .tab-content.active {
            display: block;
        }

        #network-container {
            width: 100%;
            height: 700px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
        }
    </style>
</head>

<body>

    <div class="tab-menu">
        <button class="tab-button active" onclick="openTab('main-tab', this)">전체 네트워크 그래프</button>
        <button class="tab-button" onclick="openTab('list-tab', this)">데이터 관리</button>
    </div>

    <div id="main-tab" class="tab-content active">
        <h3>전체 사건 관계도</h3>
        <p>DB에 저장된 모든 기초사건과 연결관계를 통합하여 시각화합니다.</p>
        <button class="save-btn" onclick="buildFullNetwork()">데이터 전체 불러와서 그래프 그리기</button>
        <div id="network-container"></div>
    </div>

    <div id="list-tab" class="tab-content">
        <h3>데이터 관리</h3>
        <div id="all-data-display"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qdizucrodtfsqcjxadmk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkaXp1Y3JvZHRmc3FjanhhZG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTQ1OTQsImV4cCI6MjA5ODEzMDU5NH0.0ItwcoyDwAMm5VOn5NaLj9QzHzoU53G4AojTddvamPI';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function openTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        // 🟢 데이터베이스의 모든 데이터를 가져와 거대한 네트워크를 구성하는 핵심 함수
        async function buildFullNetwork() {
            const container = document.getElementById('network-container');
            container.innerHTML = '<p>전체 데이터를 분석하여 그래프를 그리는 중...</p>';

            const { data, error } = await db.from('events').select('*');
            if (error || !data) { alert("데이터를 불러올 수 없습니다."); return; }

            const nodesMap = new Map();
            const edges = [];

            data.forEach(path => {
                const seq = [
                    { name: path.root_event, type: 'root' },
                    { name: path.link_1, type: 'event' },
                    { name: path.link_2, type: 'event' },
                    { name: path.link_3, type: 'event' },
                    { name: path.link_4, type: 'event' },
                    { name: path.company, type: 'company' }
                ].filter(item => item.name && item.name.trim() !== '' && item.name.trim() !== '없음');

                // 노드 생성
                seq.forEach(item => {
                    const name = item.name.trim();
                    if (!nodesMap.has(name)) {
                        nodesMap.set(name, { id: name, label: name, type: item.type, count: 1 });
                    } else {
                        nodesMap.get(name).count += 1;
                    }
                });

                // 엣지(연결) 생성
                for (let i = 0; i < seq.length - 1; i++) {
                    edges.push({ from: seq[i].name.trim(), to: seq[i + 1].name.trim() });
                }
            });

            // Vis.js 노드 스타일 적용
            const nodes = Array.from(nodesMap.values()).map(n => {
                const color = n.type === 'root' ? '#2196F3' : (n.type === 'company' ? '#FF9800' : '#4CAF50');
                return {
                    id: n.id,
                    label: n.label,
                    shape: 'dot',
                    size: 10 + (n.count * 2), // 많이 등장할수록 크게
                    color: { background: color, border: '#fff' }
                };
            });

            const networkData = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
            new vis.Network(container, networkData, {
                nodes: { font: { face: 'Malgun Gothic' } },
                edges: { arrows: 'to' }
            });
        }
    </script>
</body>

</html>
