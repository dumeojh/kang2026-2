<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미적분 문제은행</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
    rel="stylesheet">
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-svg.js" id="MathJax-script" async></script>

  <style>
    :root {
      --paper: #FBF8F1;
      --ink: #1B3A5C;
      --ink-soft: #3F5D7D;
      --red: #B5342A;
      --red-soft: #E7D3CF;
      --slate: #63707D;
      --line: rgba(27, 58, 92, 0.09);
      --card-shadow: 0 1px 0 rgba(27, 58, 92, 0.05), 0 8px 24px -12px rgba(27, 58, 92, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 40px 20px 80px;
      background-color: var(--paper);
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 28px 28px;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--ink);
      line-height: 1.6;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }

    header.page-head {
      margin-bottom: 40px;
      padding-bottom: 22px;
      border-bottom: 2px solid var(--ink);
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.18em;
      color: var(--red);
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Noto Serif KR', serif;
      font-weight: 700;
      font-size: 34px;
      margin: 6px 0 8px;
      letter-spacing: -0.01em;
    }

    .page-head p {
      margin: 0;
      color: var(--slate);
      font-size: 14.5px;
    }

    .card {
      background: #fff;
      border: 1px solid rgba(27, 58, 92, 0.12);
      border-radius: 4px;
      box-shadow: var(--card-shadow);
      margin-bottom: 34px;
      overflow: hidden;
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 5px;
      background: var(--ink);
    }

    .card-inner {
      padding: 28px 30px 26px 32px;
    }

    .card-tags {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .tag-num {
      font-family: 'Noto Serif KR', serif;
      font-weight: 700;
      font-size: 13px;
      color: #fff;
      background: var(--ink);
      padding: 3px 10px;
      border-radius: 3px;
      letter-spacing: 0.03em;
    }

    .tag-topic {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-soft);
    }

    .tag-diff {
      margin-left: auto;
      font-size: 12px;
      font-weight: 700;
      color: var(--red);
      border: 1px solid var(--red-soft);
      background: #FBF1EF;
      padding: 2px 9px;
      border-radius: 20px;
    }

    .statement {
      font-size: 16.5px;
      color: var(--ink);
      margin-bottom: 14px;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 6px 14px;
      margin-bottom: 20px;
      font-size: 15px;
      color: var(--ink-soft);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    button.reveal-btn {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13.5px;
      font-weight: 700;
      padding: 9px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--ink);
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, transform 0.1s ease;
    }

    button.reveal-btn:hover {
      background: var(--ink);
      color: #fff;
    }

    button.reveal-btn:active {
      transform: scale(0.97);
    }

    button.reveal-btn:focus-visible {
      outline: 3px solid #9BB6D6;
      outline-offset: 2px;
    }

    button.reveal-btn.concept-btn {
      border-color: var(--red);
      color: var(--red);
    }

    button.reveal-btn.concept-btn:hover {
      background: var(--red);
      color: #fff;
    }

    .panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }

    .panel.open {
      max-height: 2600px;
    }

    .panel-body {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px dashed rgba(27, 58, 92, 0.25);
    }

    .solution-label,
    .concept-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Noto Serif KR', serif;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .solution-label {
      color: var(--red);
    }

    .concept-label {
      color: var(--ink-soft);
    }

    .solution-steps {
      font-size: 15px;
      color: var(--ink);
    }

    .solution-steps p {
      margin: 0 0 10px;
    }

    .answer-stamp {
      display: inline-block;
      margin-top: 6px;
      padding: 6px 14px;
      border: 2px solid var(--red);
      border-radius: 6px;
      color: var(--red);
      font-weight: 900;
      font-size: 14.5px;
      transform: rotate(-2deg);
      background: #FDF6F5;
    }

    .concept-body {
      font-size: 15px;
      color: var(--ink);
      margin-bottom: 16px;
    }

    .concept-body p {
      margin: 0 0 10px;
    }

    .practice-box {
      background: #F6F3EA;
      border: 1px dashed rgba(27, 58, 92, 0.3);
      border-radius: 6px;
      padding: 18px 20px;
    }

    .practice-box .ptitle {
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      color: var(--slate);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .practice-statement {
      font-size: 15px;
      margin-bottom: 12px;
    }

    footer.note {
      margin-top: 50px;
      font-size: 12.5px;
      color: var(--slate);
      text-align: center;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 22px;
    }

    button.util-btn {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--slate);
      background: #fff;
      color: var(--slate);
      cursor: pointer;
    }

    button.util-btn:hover {
      background: var(--slate);
      color: #fff;
    }

    button.util-btn:focus-visible {
      outline: 3px solid #9BB6D6;
      outline-offset: 2px;
    }

    .edit-field {
      margin-bottom: 14px;
    }

    .edit-field label {
      display: block;
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--slate);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .edit-field input[type="text"],
    .edit-field textarea {
      width: 100%;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 13.5px;
      line-height: 1.5;
      color: var(--ink);
      background: #FBFAF6;
      border: 1px solid rgba(27, 58, 92, 0.2);
      border-radius: 6px;
      padding: 9px 11px;
      resize: vertical;
    }

    .edit-field input[type="text"]:focus,
    .edit-field textarea:focus {
      outline: none;
      border-color: var(--ink-soft);
      box-shadow: 0 0 0 3px rgba(27, 58, 92, 0.08);
    }

    .edit-two-col {
      display: grid;
      grid-template-columns: 1fr 140px;
      gap: 14px;
    }

    .edit-hint {
      font-size: 11.5px;
      color: var(--slate);
      margin: -8px 0 16px;
    }

    .edit-actions {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }

    .save-btn {
      border-color: var(--ink);
      background: var(--ink);
      color: #fff;
    }

    .save-btn:hover {
      opacity: 0.88;
    }

    .danger-btn {
      border-color: var(--red);
      color: var(--red);
    }

    .danger-btn:hover {
      background: var(--red);
      color: #fff;
    }

    /* ---------------- 전체화면 편집기 ---------------- */
    .edit-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background-color: var(--paper);
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 28px 28px;
      display: flex;
      flex-direction: column;
    }

    .edit-overlay.hidden {
      display: none;
    }

    .editor-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 26px;
      background: #fff;
      border-bottom: 2px solid var(--ink);
    }

    .editor-title {
      font-family: 'Noto Serif KR', serif;
      font-weight: 700;
      font-size: 17px;
      margin-right: auto;
    }

    .hint-kbd {
      font-size: 12px;
      color: var(--slate);
      margin-right: 8px;
    }

    .editor-body {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    .editor-pane {
      flex: 1;
      min-width: 0;
      overflow-y: auto;
      padding: 28px 40px;
    }

    .editor-pane.form-pane {
      border-right: 1.5px dashed rgba(27, 58, 92, 0.25);
    }

    .editor-pane.preview-pane {
      background: #fff;
    }

    .preview-heading {
      font-size: 11.5px;
      font-weight: 900;
      letter-spacing: 0.06em;
      color: var(--slate);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    @media (max-width: 900px) {
      .editor-body {
        flex-direction: column;
      }

      .editor-pane {
        overflow-y: visible;
        padding: 22px 20px;
      }

      .editor-pane.form-pane {
        border-right: none;
        border-bottom: 1.5px dashed rgba(27, 58, 92, 0.25);
      }

      .editor-header {
        flex-wrap: wrap;
        padding: 12px 16px;
      }

      .hint-kbd {
        display: none;
      }
    }


    @media (prefers-reduced-motion: reduce) {
      .panel {
        transition: none;
      }

      button.reveal-btn {
        transition: none;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 24px 14px 60px;
      }

      .card-inner {
        padding: 22px 18px 20px 22px;
      }

      h1 {
        font-size: 27px;
      }
    }
  </style>
</head>

<body>

  <div id="editOverlay" class="edit-overlay hidden"></div>

  <div class="wrap">
    <header class="page-head">
      <div class="eyebrow">CALCULUS PROBLEM BANK</div>
      <h1>📐 미적분 문제은행</h1>
      <p>문제를 먼저 풀어본 뒤, 풀이·기초개념·연습문제 버튼을 눌러 확인해보세요.</p>
    </header>

    <div class="toolbar">
      <button class="util-btn" onclick="addNewProblem()">＋ 새 문제 추가</button>
      <button class="util-btn" onclick="resetToDefaults()">⟲ 기본 문제로 초기화</button>
    </div>

    <div id="problemList"></div>

    <footer class="note">
      각 문제 카드의 "✏️ 편집" 버튼을 누르면 풀이·기초개념 내용을 직접 고쳐 쓸 수 있어요. 수정 내용은 이 브라우저에 자동 저장됩니다.
    </footer>
  </div>

  <script>
    /* =========================================================================
       DEFAULT_PROBLEMS 는 "초기화" 버튼을 눌렀을 때 되돌아가는 기본 예시 문제입니다.
       보통은 이 배열을 직접 건드릴 필요 없이, 화면의 "＋ 새 문제 추가"와
       각 카드의 "✏️ 편집" 버튼으로 문제를 추가/수정하면 됩니다.
       (수정 내용은 이 브라우저의 localStorage에 자동 저장됩니다)
    
       LaTeX 수식은 $...$ (인라인) 또는 $$...$$ (블록) 문법을 그대로 쓰면 됩니다.
       ========================================================================= */

    const DEFAULT_PROBLEMS = [
      {
        topic: "미분 · 접선과 정적분의 활용",
        difficulty: "4점",
        statement: "삼차함수 $f(x) = x^3 - 3x + 2$ 에 대하여, 곡선 $y=f(x)$ 위의 점 $(1,\\,f(1))$ 에서의 접선을 $l$ 이라 하자. 곡선 $y=f(x)$ 와 접선 $l$ 로 둘러싸인 부분의 넓이는?",
        choices: ["① 21/4", "② 23/4", "③ 25/4", "④ 27/4", "⑤ 29/4"],
        answerLabel: "④ 27/4",
        solutionHtml: `
      <p>1) $f'(x) = 3x^2-3$ 이므로 $f'(1)=0,\\ f(1)=0$. 따라서 접선 $l$: $y=0$.</p>
      <p>2) $f(x)=x^3-3x+2=(x-1)^2(x+2)$ 로 인수분해된다. $x=1$에서 접하고, $x=-2$에서 접선과 만난다.</p>
      <p>3) $-2\\le x\\le 1$ 구간에서 $(x-1)^2\\ge0,\\ (x+2)\\ge0$ 이므로 $f(x)\\ge 0$, 즉 곡선이 접선(=x축) 위쪽에 있다.</p>
      <p>4) 넓이 $=\\displaystyle\\int_{-2}^{1} f(x)\\,dx = \\left[\\dfrac{x^4}{4}-\\dfrac{3}{2}x^2+2x\\right]_{-2}^{1} = \\dfrac34-(-6)=\\dfrac{27}{4}$</p>
    `,
        concept: {
          title: "기초개념: 곡선과 접선으로 둘러싸인 넓이",
          bodyHtml: `
        <p>곡선 $y=f(x)$가 한 점에서 직선(접선)에 접하면, 그 접점에서 $f(x)-(\\text{접선})$은 중근을 가지는 인수를 포함합니다.</p>
        <p>둘러싸인 넓이를 구할 때는 (1) 접선의 방정식 구하기 → (2) $f(x)-(\\text{접선})$을 인수분해해서 구간의 부호 확인 → (3) 부호가 일정한 구간에서 정적분하면 됩니다.</p>
      `,
          practice: {
            statementHtml: "곡선 $y=x^2$ 위의 점 $(1,1)$에서의 접선을 $l$이라 할 때, 곡선과 접선 $l$로 둘러싸인 부분의 넓이를 구하시오.",
            answerLabel: "1/3",
            solutionHtml: `
          <p>$f(x)=x^2,\\ f'(x)=2x$ 이므로 $f'(1)=2$. 접선: $y=2x-1$.</p>
          <p>$f(x)-(\\text{접선}) = x^2-2x+1=(x-1)^2\\ge 0$ 이므로 곡선이 항상 접선 위쪽. 교점은 $x=1$ 하나뿐이라 넓이를 정의하려면 보통 구간을 함께 제시하지만, 여기서는 $(x-1)^2$의 구조상 인접한 근이 없어 실제 문제에서는 구간 $[0,2]$ 등을 함께 줍니다. $[0,2]$로 계산하면 $\\displaystyle\\int_0^2 (x-1)^2dx = \\left[\\dfrac{(x-1)^3}{3}\\right]_0^2=\\dfrac13-\\left(-\\dfrac13\\right)=\\dfrac23$.</p>
          <p>(연습문제 의도: 접선 구하기 → 차 함수 인수분해 → 정적분, 이 흐름 자체를 연습하는 것이 핵심입니다.)</p>
        `
          }
        }
      },
      {
        topic: "미분 · 함수의 극대·극소",
        difficulty: "3점",
        statement: "함수 $f(x) = 2x^3 - 9x^2 + 12x + 1$ 의 극댓값을 $M$, 극솟값을 $m$이라 할 때, $M-m$의 값은?",
        choices: ["① -1", "② 0", "③ 1", "④ 2", "⑤ 3"],
        answerLabel: "③ 1",
        solutionHtml: `
      <p>1) $f'(x) = 6x^2-18x+12 = 6(x-1)(x-2)$</p>
      <p>2) $x<1$에서 $f'(x)>0$, $1<x<2$에서 $f'(x)<0$, $x>2$에서 $f'(x)>0$.</p>
      <p>3) 따라서 $x=1$에서 극대, $x=2$에서 극소.</p>
      <p>4) $M=f(1)=2-9+12+1=6,\\quad m=f(2)=16-36+24+1=5$</p>
      <p>5) $M-m = 6-5 = 1$</p>
    `,
        concept: {
          title: "기초개념: 도함수의 부호와 극값",
          bodyHtml: `
        <p>$f'(x)$의 부호가 <b>양(+)에서 음(-)으로</b> 바뀌는 점에서 극댓값을, <b>음(-)에서 양(+)으로</b> 바뀌는 점에서 극솟값을 가집니다.</p>
        <p>순서: (1) $f'(x)=0$의 근 구하기 → (2) 근 좌우에서 $f'(x)$ 부호 확인(표로 정리) → (3) 극값이 되는 $x$에서 $f(x)$ 대입.</p>
      `,
          practice: {
            statementHtml: "함수 $f(x)=x^3-3x$ 의 극댓값을 구하시오.",
            answerLabel: "2",
            solutionHtml: `
          <p>$f'(x)=3x^2-3=3(x-1)(x+1)$. $x=-1$에서 극대, $x=1$에서 극소.</p>
          <p>극댓값 $=f(-1)=-1+3=2$</p>
        `
          }
        }
      },
      {
        topic: "수열의 극한 · 무한등비급수",
        difficulty: "3점",
        statement: "첫째항이 3이고 공비가 $r$ $(0<r<1)$인 등비수열의 무한등비급수의 합이 5로 수렴할 때, $r$의 값은?",
        choices: ["① 1/5", "② 2/5", "③ 3/5", "④ 4/5", "⑤ 1"],
        answerLabel: "② 2/5",
        solutionHtml: `
      <p>1) 무한등비급수의 합 공식: $S = \\dfrac{a}{1-r}\\ (|r|<1)$</p>
      <p>2) $\\dfrac{3}{1-r}=5 \\ \\Rightarrow\\ 1-r=\\dfrac35 \\ \\Rightarrow\\ r=\\dfrac25$</p>
    `,
        concept: {
          title: "기초개념: 무한등비급수의 합",
          bodyHtml: `
        <p>첫째항이 $a$, 공비가 $r$인 등비수열의 무한등비급수는 $|r|<1$일 때만 수렴하며, 그 합은 $S=\\dfrac{a}{1-r}$ 입니다.</p>
        <p>문제를 풀 때는 항상 <b>$|r|<1$ 조건을 만족하는지</b> 먼저 확인하는 습관이 중요합니다.</p>
      `,
          practice: {
            statementHtml: "첫째항이 2, 공비가 $\\dfrac12$인 무한등비급수의 합을 구하시오.",
            answerLabel: "4",
            solutionHtml: `
          <p>$S=\\dfrac{2}{1-\\frac12}=\\dfrac{2}{\\frac12}=4$</p>
        `
          }
        }
      }
    ];

    const STORAGE_KEY = 'calcProblemBank_v1';

    function loadProblems() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch (e) { /* 저장된 데이터가 손상된 경우 기본값 사용 */ }
      return JSON.parse(JSON.stringify(DEFAULT_PROBLEMS));
    }

    function saveProblems() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(PROBLEMS));
      } catch (e) {
        alert('저장에 실패했습니다. (브라우저 저장 공간을 확인해주세요)');
      }
    }

    let PROBLEMS = loadProblems();
    let currentEditIndex = null; // 지금 전체화면 편집기에서 열려있는 문제의 index
    let editIsNew = false;       // "새 문제 추가"로 만든, 아직 저장 전인 문제인지
    let editDirty = false;       // 편집기에서 뭔가 한 글자라도 고쳤는지

    function blankProblem() {
      return {
        topic: "새 단원 · 유형을 입력하세요",
        difficulty: "3점",
        statement: "문제 본문을 입력하세요. 수식은 $x^2+1$ 처럼 $ 로 감싸주세요.",
        choices: ["① ", "② ", "③ ", "④ ", "⑤ "],
        answerLabel: "",
        solutionHtml: "<p>풀이 1단계...</p>",
        concept: {
          title: "기초개념 제목을 입력하세요",
          bodyHtml: "<p>개념 설명을 입력하세요.</p>",
          practice: {
            statementHtml: "쉬운 연습문제 본문을 입력하세요.",
            answerLabel: "",
            solutionHtml: "<p>연습문제 풀이를 입력하세요.</p>"
          }
        }
      };
    }

    function addNewProblem() {
      PROBLEMS.push(blankProblem());
      openEditor(PROBLEMS.length - 1, true);
    }

    function resetToDefaults() {
      if (!confirm('편집한 모든 내용이 기본 예시 문제로 되돌아갑니다. 계속할까요?')) return;
      PROBLEMS = JSON.parse(JSON.stringify(DEFAULT_PROBLEMS));
      saveProblems();
      renderProblems();
    }

    // ---------------- [전체화면 편집기] ----------------
    // 노트북 화면 전체를 편집기로 씁니다: 왼쪽은 입력창, 오른쪽은 실시간 미리보기.
    // 저장/취소/삭제 버튼은 항상 위쪽에 고정되어 있어서 스크롤할 필요가 없습니다.

    function openEditor(idx, isNew = false) {
      currentEditIndex = idx;
      editIsNew = isNew;
      editDirty = false;

      const overlay = document.getElementById('editOverlay');
      const p = PROBLEMS[idx];

      overlay.innerHTML = `
    <div class="editor-header">
      <div class="editor-title">✏️ 문제 ${String(idx + 1).padStart(2, '0')} 편집</div>
      <div class="hint-kbd">⌘ / Ctrl + Enter 저장 · Esc 취소</div>
      <button class="reveal-btn save-btn" onclick="saveEdit()">💾 저장</button>
      <button class="reveal-btn" onclick="requestCloseEditor()">취소</button>
      <button class="reveal-btn danger-btn" onclick="deleteFromEditor()">🗑 삭제</button>
    </div>
    <div class="editor-body">
      <div class="editor-pane form-pane">${renderEditorFields(p)}</div>
      <div class="editor-pane preview-pane">
        <div class="preview-heading">👀 미리보기 (입력하면 바로 반영됩니다)</div>
        <div id="previewSurface">${buildPreviewHtml(p)}</div>
      </div>
    </div>
  `;

      overlay.classList.remove('hidden');
      document.body.style.overflow = 'hidden';

      const firstField = overlay.querySelector('[data-field="topic"]');
      if (firstField) firstField.focus();
    }

    function closeEditor() {
      document.getElementById('editOverlay').classList.add('hidden');
      document.getElementById('editOverlay').innerHTML = '';
      document.body.style.overflow = '';
      currentEditIndex = null;
      editIsNew = false;
      editDirty = false;
    }

    function requestCloseEditor() {
      if (editIsNew) {
        if (confirm('작성 중인 새 문제를 취소할까요? 입력한 내용은 저장되지 않습니다.')) {
          PROBLEMS.splice(currentEditIndex, 1);
          closeEditor();
          renderProblems();
        }
        return;
      }
      if (editDirty && !confirm('저장하지 않은 변경 내용이 있습니다. 그대로 닫을까요?')) return;
      closeEditor();
    }

    function deleteFromEditor() {
      if (!confirm('이 문제를 삭제할까요? 되돌릴 수 없습니다.')) return;
      PROBLEMS.splice(currentEditIndex, 1);
      saveProblems();
      closeEditor();
      renderProblems();
    }

    function saveEdit() {
      PROBLEMS[currentEditIndex] = readEditForm();
      saveProblems();
      closeEditor();
      renderProblems();
    }

    function toggle(id) {
      const panel = document.getElementById(id);
      panel.classList.toggle('open');
      if (window.MathJax && panel.classList.contains('open')) {
        MathJax.typesetPromise([panel]);
      }
    }

    function esc(str) {
      return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function renderViewCard(p, idx) {
      const n = String(idx + 1).padStart(2, '0');
      const solId = `sol-${idx}`;
      const conceptId = `concept-${idx}`;
      const practiceSolId = `psol-${idx}`;

      const practiceHtml = p.concept.practice ? `
    <div class="practice-box">
      <div class="ptitle">기초개념 연습문제</div>
      <div class="practice-statement">${p.concept.practice.statementHtml}</div>
      <button class="reveal-btn" onclick="toggle('${practiceSolId}')">🖊 연습문제 풀이 보기</button>
      <div class="panel" id="${practiceSolId}">
        <div class="panel-body">
          <div class="solution-label">✎ 풀이</div>
          <div class="solution-steps">${p.concept.practice.solutionHtml}</div>
          <span class="answer-stamp">정답 ${p.concept.practice.answerLabel}</span>
        </div>
      </div>
    </div>
  ` : '';

      return `
    <div class="card-inner">
      <div class="card-tags">
        <span class="tag-num">문제 ${n}</span>
        <span class="tag-topic">${p.topic}</span>
        <span class="tag-diff">${p.difficulty}</span>
      </div>
      <div class="statement">${p.statement}</div>
      <div class="choices">${p.choices.map(c => `<span>${c}</span>`).join('')}</div>

      <div class="btn-row">
        <button class="reveal-btn" onclick="toggle('${solId}')">🖊 풀이 보기</button>
        <button class="reveal-btn concept-btn" onclick="toggle('${conceptId}')">📘 기초개념</button>
        <button class="util-btn" onclick="openEditor(${idx})">✏️ 편집</button>
      </div>

      <div class="panel" id="${solId}">
        <div class="panel-body">
          <div class="solution-label">✎ 풀이</div>
          <div class="solution-steps">${p.solutionHtml}</div>
          <span class="answer-stamp">정답 ${p.answerLabel}</span>
        </div>
      </div>

      <div class="panel" id="${conceptId}">
        <div class="panel-body">
          <div class="concept-label">📘 ${p.concept.title}</div>
          <div class="concept-body">${p.concept.bodyHtml}</div>
          ${practiceHtml}
        </div>
      </div>
    </div>
  `;
    }

    function buildPreviewHtml(p) {
      const practiceHtml = p.concept.practice ? `
    <div class="practice-box">
      <div class="ptitle">기초개념 연습문제</div>
      <div class="practice-statement">${p.concept.practice.statementHtml}</div>
      <div class="solution-label" style="margin-top:10px;">✎ 연습문제 풀이</div>
      <div class="solution-steps">${p.concept.practice.solutionHtml}</div>
      <span class="answer-stamp">정답 ${p.concept.practice.answerLabel}</span>
    </div>
  ` : '';

      return `
    <div class="card-tags">
      <span class="tag-topic">${p.topic}</span>
      <span class="tag-diff">${p.difficulty}</span>
    </div>
    <div class="statement">${p.statement}</div>
    <div class="choices">${(p.choices || []).map(c => `<span>${c}</span>`).join('')}</div>

    <div class="solution-label" style="margin-top:16px;">✎ 풀이</div>
    <div class="solution-steps">${p.solutionHtml}</div>
    <span class="answer-stamp">정답 ${p.answerLabel}</span>

    <div class="concept-label" style="margin-top:20px;">📘 ${p.concept.title}</div>
    <div class="concept-body">${p.concept.bodyHtml}</div>
    ${practiceHtml}
  `;
    }

    function readEditForm() {
      const root = document.getElementById('editOverlay');
      const val = (name) => root.querySelector(`[data-field="${name}"]`).value;
      const choicesRaw = val('choices').split('\n').map(s => s.trim()).filter(s => s.length > 0);

      return {
        topic: val('topic'),
        difficulty: val('difficulty'),
        statement: val('statement'),
        choices: choicesRaw,
        answerLabel: val('answerLabel'),
        solutionHtml: val('solutionHtml'),
        concept: {
          title: val('conceptTitle'),
          bodyHtml: val('conceptBody'),
          practice: {
            statementHtml: val('practiceStatement'),
            answerLabel: val('practiceAnswer'),
            solutionHtml: val('practiceSolution')
          }
        }
      };
    }

    let previewTimer = null;
    function schedulePreview() {
      editDirty = true;
      clearTimeout(previewTimer);
      previewTimer = setTimeout(updatePreview, 250);
    }

    function updatePreview() {
      const previewEl = document.getElementById('previewSurface');
      if (!previewEl) return;
      previewEl.innerHTML = buildPreviewHtml(readEditForm());
      if (window.MathJax) MathJax.typesetPromise([previewEl]);
    }

    function renderEditorFields(p) {
      return `
    <div class="edit-two-col">
      <div class="edit-field">
        <label>단원 / 유형</label>
        <input type="text" data-field="topic" value="${esc(p.topic)}" oninput="schedulePreview()">
      </div>
      <div class="edit-field">
        <label>배점</label>
        <input type="text" data-field="difficulty" value="${esc(p.difficulty)}" oninput="schedulePreview()">
      </div>
    </div>

    <div class="edit-field">
      <label>문제 본문</label>
      <textarea data-field="statement" rows="3" oninput="schedulePreview()">${esc(p.statement)}</textarea>
    </div>
    <div class="edit-hint">수식은 $x^2+1$ 처럼 $ 로 감싸 쓰세요. 백슬래시는 \\\\ 두 번 (예: \\\\dfrac, \\\\int)</div>

    <div class="edit-field">
      <label>선택지 (한 줄에 하나씩)</label>
      <textarea data-field="choices" rows="5" oninput="schedulePreview()">${esc((p.choices || []).join('\n'))}</textarea>
    </div>

    <div class="edit-field">
      <label>정답 표시</label>
      <input type="text" data-field="answerLabel" value="${esc(p.answerLabel)}" oninput="schedulePreview()">
    </div>

    <div class="edit-field">
      <label>풀이 (학생 수준에 맞게 자유롭게 수정하세요)</label>
      <textarea data-field="solutionHtml" rows="7" oninput="schedulePreview()">${esc(p.solutionHtml)}</textarea>
    </div>

    <div class="edit-field">
      <label>기초개념 제목</label>
      <input type="text" data-field="conceptTitle" value="${esc(p.concept.title)}" oninput="schedulePreview()">
    </div>
    <div class="edit-field">
      <label>기초개념 설명</label>
      <textarea data-field="conceptBody" rows="5" oninput="schedulePreview()">${esc(p.concept.bodyHtml)}</textarea>
    </div>

    <div class="edit-field">
      <label>기초개념 연습문제 본문</label>
      <textarea data-field="practiceStatement" rows="3" oninput="schedulePreview()">${esc(p.concept.practice.statementHtml)}</textarea>
    </div>
    <div class="edit-field">
      <label>연습문제 정답 표시</label>
      <input type="text" data-field="practiceAnswer" value="${esc(p.concept.practice.answerLabel)}" oninput="schedulePreview()">
    </div>
    <div class="edit-field">
      <label>연습문제 풀이</label>
      <textarea data-field="practiceSolution" rows="4" oninput="schedulePreview()">${esc(p.concept.practice.solutionHtml)}</textarea>
    </div>
  `;
    }

    function renderProblems() {
      const list = document.getElementById('problemList');

      if (PROBLEMS.length === 0) {
        list.innerHTML = `<div class="card"><div class="card-inner">등록된 문제가 없습니다. 위의 "＋ 새 문제 추가"를 눌러 첫 문제를 만들어보세요.</div></div>`;
        return;
      }

      list.innerHTML = PROBLEMS.map((p, idx) => {
        return `<div class="card" id="card-${idx}">${renderViewCard(p, idx)}</div>`;
      }).join('');

      if (window.MathJax) MathJax.typesetPromise();
    }

    renderProblems();

    document.addEventListener('keydown', (e) => {
      if (currentEditIndex === null) return;
      if (e.key === 'Escape') {
        e.preventDefault();
        requestCloseEditor();
      } else if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        saveEdit();
      }
    });
  </script>

</body>

</html>
