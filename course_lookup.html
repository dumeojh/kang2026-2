<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>공동교육과정 수강 조회</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Pretendard:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --paper: #fbf9f4;
      --line: #d8d2c2;
      --ink: #2b2a27;
      --sub: #6f6a5e;
      --accent: #8a5a3b;
      --accent-soft: #f1e6da;
      --error: #b3413d;
      --error-soft: #f7e3e1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Pretendard', sans-serif;
      color: var(--ink);
      background-color: var(--paper);
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 24px 24px;
      background-position: -1px -1px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.06);
      padding: 32px 28px;
    }

    h1 {
      font-family: 'Gowun Batang', serif;
      font-size: 22px;
      margin: 0 0 4px;
      text-align: center;
    }

    p.sub {
      text-align: center;
      color: var(--sub);
      font-size: 13px;
      margin: 0 0 24px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--sub);
      margin: 14px 0 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      font-family: 'JetBrains Mono', monospace;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
    }

    button {
      width: 100%;
      margin-top: 22px;
      padding: 13px 0;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Pretendard', sans-serif;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity .15s;
    }

    button:disabled {
      opacity: .5;
      cursor: default;
    }

    button:active {
      opacity: .85;
    }

    #result {
      margin-top: 22px;
    }

    .course-box {
      border: 1px solid var(--accent);
      background: var(--accent-soft);
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 10px;
    }

    .course-box .subject {
      font-family: 'Gowun Batang', serif;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .course-box .row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: var(--ink);
      padding: 3px 0;
    }

    .course-box .row .k {
      color: var(--sub);
    }

    .course-box .row .v {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      text-align: right;
    }

    .msg {
      text-align: center;
      font-size: 14px;
      padding: 14px;
      border-radius: 8px;
    }

    .msg.error {
      background: var(--error-soft);
      color: var(--error);
    }

    .msg.empty {
      color: var(--sub);
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>공동교육과정 수강 조회</h1>
    <p class="sub">학번과 이름을 입력하면 수강 정보를 확인할 수 있어요</p>

    <label for="semester">학기</label>
    <input id="semester" type="text" value="2026-2" />

    <label for="studentId">학번</label>
    <input id="studentId" type="text" inputmode="numeric" placeholder="예: 10103" />

    <label for="studentName">이름</label>
    <input id="studentName" type="text" placeholder="예: 홍길동" />

    <button id="searchBtn">조회하기</button>

    <div id="result"></div>
  </div>

  <script>
    // ===== 아래 두 값만 채워주세요 =====
    const SUPABASE_URL = 'https://qdizucrodtfsqcjxadmk.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkaXp1Y3JvZHRmc3FjanhhZG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTQ1OTQsImV4cCI6MjA5ODEzMDU5NH0.0ItwcoyDwAMm5VOn5NaLj9QzHzoU53G4AojTddvamPI';
    // ===================================

    const btn = document.getElementById('searchBtn');
    const resultEl = document.getElementById('result');

    function normalize(str) {
      return (str || '').trim();
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showConfigError(message) {
      resultEl.innerHTML = `<div class="msg error">${message}</div>`;
      btn.disabled = true;
    }

    // --- 설정 문제를 화면에 바로 보여주는 초기 점검 ---
    let sb = null;
    let initError = null;

    try {
      if (!window.supabase || typeof window.supabase.createClient !== 'function') {
        initError = 'Supabase 라이브러리(jsdelivr CDN)를 불러오지 못했습니다. 네트워크/방화벽에서 cdn.jsdelivr.net 접근이 막혀있는지 확인해주세요.';
      } else if (!SUPABASE_ANON_KEY || SUPABASE_ANON_KEY === 'YOUR_SUPABASE_ANON_KEY') {
        initError = 'SUPABASE_ANON_KEY가 아직 실제 값으로 바뀌지 않았습니다. Supabase 대시보드 → Settings → API 에서 anon key를 복사해 코드에 넣어주세요.';
      } else {
        sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
    } catch (e) {
      console.error(e);
      initError = 'Supabase 클라이언트 초기화 중 오류가 발생했습니다: ' + e.message;
    }

    if (initError) {
      console.error('[초기화 오류]', initError);
      showConfigError(initError);
    }

    async function search() {
      if (initError) {
        showConfigError(initError);
        return;
      }

      const semester = normalize(document.getElementById('semester').value);
      const studentId = normalize(document.getElementById('studentId').value);
      const studentName = normalize(document.getElementById('studentName').value);

      if (!semester || !studentId || !studentName) {
        resultEl.innerHTML = '<div class="msg error">학기, 학번, 이름을 모두 입력해주세요.</div>';
        return;
      }

      btn.disabled = true;
      btn.textContent = '조회 중...';
      resultEl.innerHTML = '';

      try {
        const { data, error } = await sb
          .from('joint_curriculum_enrollments')
          .select('subject_name, host_school, class_time')
          .eq('semester', semester)
          .eq('student_id', studentId)
          .eq('student_name', studentName);

        if (error) throw error;

        if (!data || data.length === 0) {
          resultEl.innerHTML = '<div class="msg error">일치하는 학생 정보가 없습니다. 학번/이름/학기를 다시 확인해주세요.</div>';
          return;
        }

        resultEl.innerHTML = data.map(row => `
        <div class="course-box">
          <div class="subject">${escapeHtml(row.subject_name)}</div>
          <div class="row"><span class="k">거점교</span><span class="v">${escapeHtml(row.host_school)}</span></div>
          <div class="row"><span class="k">수업 시간</span><span class="v">${escapeHtml(row.class_time)}</span></div>
        </div>
      `).join('');

      } catch (err) {
        console.error('[조회 오류]', err);
        const detail = err && err.message ? ` (${err.message})` : '';
        resultEl.innerHTML = `<div class="msg error">조회 중 오류가 발생했습니다${escapeHtml(detail)}. 콘솔(F12)에서 자세한 내용을 확인해주세요.</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = '조회하기';
      }
    }

    btn.addEventListener('click', search);
    document.getElementById('studentName').addEventListener('keydown', e => {
      if (e.key === 'Enter') search();
    });
  </script>
</body>

</html>
