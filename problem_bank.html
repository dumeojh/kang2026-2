<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>사건 관계도 분석</title>
  <style>
    body {
      font-family: 'Malgun Gothic', sans-serif;
      margin: 20px;
    }

    .tab-menu {
      margin-bottom: 20px;
    }

    .tab-button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: 1px solid #ccc;
      background-color: #f1f1f1;
      border-radius: 5px 5px 0 0;
    }

    .tab-button.active {
      background-color: #4CAF50;
      color: white;
      border-bottom: none;
    }

    .tab-content {
      display: none;
      border: 1px solid #ccc;
      padding: 20px;
      border-radius: 0 5px 5px 5px;
      max-width: 600px;
    }

    .tab-content.active {
      display: block;
    }

    .input-group {
      margin-bottom: 10px;
    }

    .input-group label {
      display: inline-block;
      width: 100px;
      font-weight: bold;
    }

    .input-group input {
      padding: 8px;
      width: 300px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .save-btn,
    .search-btn,
    .load-btn {
      padding: 10px 20px;
      background-color: #2196F3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }

    th {
      background-color: #4CAF50;
      color: white;
    }

    tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    .box-container {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 20px;
      padding: 20px;
      background-color: #f9f9f9;
      border-radius: 8px;
    }

    .event-box {
      border: 2px solid #4CAF50;
      padding: 10px 20px;
      border-radius: 8px;
      background-color: white;
      font-weight: bold;
      box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
    }

    .company-box {
      border: 2px solid #FF9800;
      padding: 10px 20px;
      border-radius: 8px;
      background-color: #FFF3E0;
      font-weight: bold;
      color: #E65100;
      box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
    }

    .arrow {
      font-size: 24px;
      font-weight: bold;
      color: #777;
    }

    /* 관련 회사 리스트 태그 스타일 */
    .company-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 15px;
    }

    .company-tag {
      background-color: #FFF3E0;
      border: 1px solid #FF9800;
      color: #E65100;
      padding: 8px 18px;
      border-radius: 20px;
      font-weight: bold;
      box-shadow: 1px 1px 3px rgba(0, 0, 0, 0.1);
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <div class="tab-menu">
    <button class="tab-button active" onclick="openTab('event-tab', this)">기초사건</button>
    <!-- 기초회사 버튼 클릭 시 fetchCompanies() 실행 -->
    <button class="tab-button" onclick="openTab('company-tab', this); fetchCompanies()">기초회사</button>
    <button class="tab-button" onclick="openTab('occurred-tab', this)">발생사건</button>
  </div>

  <div id="event-tab" class="tab-content active">
    <h3>기초사건 기록</h3>
    <div class="input-group">
      <label>기초사건</label>
      <input type="text" id="root-event" placeholder="예: 기초사건1">
    </div>
    <div class="input-group">
      <label>연결사건 1</label>
      <input type="text" id="link-event-1" placeholder="예: 사건1">
    </div>
    <div class="input-group">
      <label>연결사건 2</label>
      <input type="text" id="link-event-2" placeholder="예: 사건2">
    </div>
    <div class="input-group">
      <label>관련 회사</label>
      <input type="text" id="related-company" placeholder="예: 회사a 또는 없음">
    </div>
    <button class="save-btn" onclick="saveData()">수파베이스에 저장하기</button>
    <p id="save-message" style="color: blue; font-weight: bold;"></p>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #ccc;">
    <h3>저장된 전체 목록</h3>
    <button class="load-btn" style="background-color: #607D8B;" onclick="fetchAllData()">전체 데이터 불러오기</button>
    <div id="all-data-display"></div>
  </div>

  <!-- 기초회사 리스트가 출력되는 공간 -->
  <div id="company-tab" class="tab-content">
    <h3>저장된 관련 회사 목록</h3>
    <p>데이터베이스에 등록된 전체 회사 리스트입니다. (중복 제외)</p>
    <div id="company-display"></div>
  </div>

  <div id="occurred-tab" class="tab-content">
    <h3>사건 관계도 분석</h3>
    <div class="input-group">
      <label>기초사건 검색</label>
      <input type="text" id="search-query" placeholder="조회할 기초사건을 입력하세요 (예: 기초사건1)">
    </div>
    <button class="search-btn" onclick="searchData()">관계도 보기</button>
    <div id="result-display"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://qdizucrodtfsqcjxadmk.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkaXp1Y3JvZHRmc3FjanhhZG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTQ1OTQsImV4cCI6MjA5ODEzMDU5NH0.0ItwcoyDwAMm5VOn5NaLj9QzHzoU53G4AojTddvamPI';

    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function openTab(tabId, btnElement) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      btnElement.classList.add('active');
    }

    async function saveData() {
      const root = document.getElementById('root-event').value.trim();
      const link1 = document.getElementById('link-event-1').value.trim();
      const link2 = document.getElementById('link-event-2').value.trim();
      const company = document.getElementById('related-company').value.trim();

      if (!root) {
        alert("기초사건은 반드시 입력해야 합니다.");
        return;
      }

      const { data, error } = await db
        .from('events')
        .insert([
          { root_event: root, link_1: link1, link_2: link2, company: company }
        ]);

      if (error) {
        console.error('저장 에러:', error);
        alert("저장 중 오류가 발생했습니다.");
        return;
      }

      document.getElementById('save-message').innerText = `'${root}' 데이터가 성공적으로 저장되었습니다.`;

      document.getElementById('root-event').value = '';
      document.getElementById('link-event-1').value = '';
      document.getElementById('link-event-2').value = '';
      document.getElementById('related-company').value = '';

      setTimeout(() => {
        document.getElementById('save-message').innerText = '';
      }, 3000);

      if (document.getElementById('all-data-display').innerHTML !== '') {
        fetchAllData();
      }
    }

    async function fetchAllData() {
      const displayArea = document.getElementById('all-data-display');
      displayArea.innerHTML = '<p>데이터를 불러오는 중...</p>';

      const { data, error } = await db
        .from('events')
        .select('*')
        .order('id', { ascending: false });

      if (error) {
        console.error('목록 조회 에러:', error);
        displayArea.innerHTML = `<p style="color: red;">오류가 발생했습니다.</p>`;
        return;
      }

      if (!data || data.length === 0) {
        displayArea.innerHTML = '<p style="color: gray; margin-top: 15px;">아직 저장된 데이터가 없습니다.</p>';
        return;
      }

      let htmlString = '<table>';
      htmlString += '<tr><th>기초사건</th><th>연결사건 1</th><th>연결사건 2</th><th>관련 회사</th></tr>';

      data.forEach(item => {
        htmlString += `<tr>
                    <td>${item.root_event || ''}</td>
                    <td>${item.link_1 || ''}</td>
                    <td>${item.link_2 || ''}</td>
                    <td>${item.company || ''}</td>
                </tr>`;
      });

      htmlString += '</table>';
      displayArea.innerHTML = htmlString;
    }

    // 관련회사 리스트를 불러오는 핵심 함수
    async function fetchCompanies() {
      const displayArea = document.getElementById('company-display');
      displayArea.innerHTML = '<p>회사 리스트를 불러오는 중...</p>';

      const { data, error } = await db
        .from('events')
        .select('company');

      if (error) {
        console.error('회사 목록 조회 에러:', error);
        displayArea.innerHTML = `<p style="color: red;">오류가 발생했습니다.</p>`;
        return;
      }

      // 중복 회사 이름 제거 및 '없음'/빈칸 필터링
      const uniqueCompanies = new Set();
      data.forEach(item => {
        const comp = item.company ? item.company.trim() : '';
        if (comp && comp !== '없음') {
          uniqueCompanies.add(comp);
        }
      });

      if (uniqueCompanies.size === 0) {
        displayArea.innerHTML = '<p style="color: gray;">저장된 회사 정보가 없습니다.</p>';
        return;
      }

      // 화면에 렌더링
      let htmlString = '<div class="company-list">';
      uniqueCompanies.forEach(company => {
        htmlString += `<div class="company-tag">${company}</div>`;
      });
      htmlString += '</div>';

      displayArea.innerHTML = htmlString;
    }

    async function searchData() {
      const query = document.getElementById('search-query').value.trim();
      const displayArea = document.getElementById('result-display');

      displayArea.innerHTML = '<p>데이터를 불러오는 중...</p>';

      if (!query) {
        alert("검색할 기초사건을 입력해주세요.");
        displayArea.innerHTML = '';
        return;
      }

      const { data, error } = await db
        .from('events')
        .select('*')
        .eq('root_event', query);

      if (error) {
        console.error('조회 에러:', error);
        displayArea.innerHTML = `<p style="color: red;">오류가 발생했습니다.</p>`;
        return;
      }

      if (!data || data.length === 0) {
        displayArea.innerHTML = `<p style="color: red; margin-top: 20px;">'${query}'에 해당하는 데이터가 없습니다.</p>`;
        return;
      }

      const result = data[0];
      let htmlString = '<div class="box-container">';
      htmlString += `<div class="event-box">${result.root_event}</div>`;

      if (result.link_1) {
        htmlString += `<div class="arrow">➔</div><div class="event-box">${result.link_1}</div>`;
      }
      if (result.link_2) {
        htmlString += `<div class="arrow">➔</div><div class="event-box">${result.link_2}</div>`;
      }
      if (result.company && result.company !== '없음') {
        htmlString += `<div class="arrow">➔</div><div class="company-box">${result.company}</div>`;
      }

      htmlString += '</div>';
      displayArea.innerHTML = htmlString;
    }
  </script>
</body>

</html>
