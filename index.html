<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안성여고 소인수 강좌 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1,
        h2 {
            text-align: center;
            color: #2c3e50;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: white;
            transition: 0.3s;
        }

        .btn-student {
            background-color: #4CAF50;
        }

        .btn-admin {
            background-color: #607D8B;
        }

        .btn-list {
            background-color: #9C27B0;
        }

        .btn-excel {
            background-color: #217346;
        }

        .btn-save-order {
            background-color: #FF9800;
        }

        .btn-auth {
            background-color: #03A9F4;
        }

        .btn-print {
            background-color: #3F51B5;
        }

        .btn-back {
            background-color: #e0e0e0;
            color: #333;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .input-group label {
            width: 60px;
            font-weight: bold;
            font-size: 16px;
            color: #333;
        }

        .input-group input,
        .input-group select {
            flex: 1;
            margin-bottom: 0;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .hidden {
            display: none;
        }

        .subject-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
            background-color: #fff;
            cursor: grab;
        }

        .subject-item button {
            width: auto;
            padding: 8px 12px;
            margin: 0 0 0 5px;
            font-size: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }

        .empty-row td {
            color: #888;
            padding: 20px;
        }

        .filter-box {
            background: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .system-box {
            background: #e3f2fd;
            border: 1px solid #bbdefb;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        @media print {

            button,
            .filter-box,
            .btn-back {
                display: none !important;
            }

            table {
                border-collapse: collapse;
                width: 100%;
            }

            th,
            td {
                border: 1px solid #000;
                padding: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="mainMenu">
            <h1>소인수 강좌 시스템</h1>
            <button class="btn-student" onclick="showSection('studentSection')">👨‍🎓 학생 소인수 과목 선택</button>
            <button class="btn-list" onclick="showSection('enrollmentListSection')">📋 신청 내역 확인 (관리자)</button>
            <button class="btn-admin" onclick="showSection('adminSection')">⚙️ 과목 환경설정 (관리자)</button>
        </div>

        <div id="studentSection" class="hidden">
            <button class="btn-back" onclick="resetStudentSection(); showSection('mainMenu')">🔙 메인 메뉴로 돌아가기</button>
            <div id="step1Auth">
                <div class="input-group"><label>학번</label><input type="text" id="studentId" placeholder="5자리"></div>
                <div class="input-group"><label>이름</label><input type="text" id="studentName" placeholder="이름"></div>
                <button class="btn-auth" onclick="verifyStudent()">🔍 학생 확인하기</button>
            </div>
            <div id="step2Subject" class="hidden">
                <div class="input-group"><label>과목</label><select id="subjectSelect"></select></div>
                <button class="btn-student" id="btnSubmitApp" onclick="submitApplication()">✅ 최종 신청하기</button>
            </div>
        </div>

        <div id="adminSection" class="hidden">
            <button class="btn-back" onclick="showSection('mainMenu')">🔙 메인 메뉴로 돌아가기</button>
            <!-- (생략: 이전과 동일한 환경설정 코드) -->
        </div>

        <div id="enrollmentListSection" class="hidden">
            <button class="btn-back" onclick="showSection('mainMenu')">🔙 메인 메뉴로 돌아가기</button>
            <h2>📋 수강 신청 내역</h2>
            <div class="filter-box" style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>학년:</label>
                    <select id="searchGrade" onchange="updateClassDropdown()">
                        <option value="all">전체</option>
                        <option value="1">1학년</option>
                        <option value="2">2학년</option>
                        <option value="3">3학년</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label>반:</label>
                    <select id="searchClass" onchange="filterEnrollments()">
                        <option value="all">전체</option>
                    </select>
                </div>
            </div>
            <button class="btn-excel" onclick="downloadExcel()">📥 엑셀 다운로드</button>
            <button class="btn-print" onclick="window.print()">🖨️ 인쇄하기</button>
            <table id="enrollmentTable">
                <thead>
                    <tr>
                        <th>학번</th>
                        <th>이름</th>
                        <th>신청 과목</th>
                    </tr>
                </thead>
                <tbody id="enrollmentTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // (Supabase 초기화 및 기본 함수들은 이전과 동일)
        let allEnrollments = [];

        async function loadEnrollments() {
            const { data } = await supabaseClient.from('enrollments').select('*').order('student_id');
            allEnrollments = data || [];
            updateClassDropdown();
        }

        // 학년 선택 시 존재하는 반만 드롭다운에 채우기
        function updateClassDropdown() {
            const gradeFilter = document.getElementById('searchGrade').value;
            const classSelect = document.getElementById('searchClass');
            classSelect.innerHTML = '<option value="all">전체</option>';

            const classes = new Set();
            allEnrollments.forEach(item => {
                const sId = String(item.student_id);
                if (gradeFilter === 'all' || sId.charAt(0) === gradeFilter) {
                    classes.add(sId.substring(1, 3));
                }
            });

            Array.from(classes).sort().forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.innerText = parseInt(c) + '반';
                classSelect.appendChild(opt);
            });
            filterEnrollments();
        }

        function filterEnrollments() {
            const gradeFilter = document.getElementById('searchGrade').value;
            const classFilter = document.getElementById('searchClass').value;
            const tbody = document.getElementById('enrollmentTableBody');
            tbody.innerHTML = '';

            allEnrollments.filter(item => {
                const sId = String(item.student_id);
                const grade = sId.charAt(0);
                const cls = sId.substring(1, 3);
                return (gradeFilter === 'all' || grade === gradeFilter) && (classFilter === 'all' || cls === classFilter);
            }).forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${item.student_id}</td><td>${item.student_name}</td><td>${item.subject_name}</td>`;
                tbody.appendChild(tr);
            });
        }

        // (기타 함수 생략)
    </script>
</body>

</html>
