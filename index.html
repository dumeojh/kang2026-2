<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안성여고 소인수 강좌 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1,
        h2 {
            text-align: center;
            color: #2c3e50;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: white;
            transition: 0.3s;
        }

        .btn-student {
            background-color: #4CAF50;
        }

        .btn-admin {
            background-color: #607D8B;
        }

        .btn-list {
            background-color: #9C27B0;
        }

        .btn-excel {
            background-color: #217346;
        }

        .btn-save-order {
            background-color: #FF9800;
        }

        .btn-auth {
            background-color: #03A9F4;
        }

        .btn-back {
            background-color: #e0e0e0;
            color: #333;
            margin-bottom: 20px;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .hidden {
            display: none;
        }

        .subject-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
            background-color: #fff;
            cursor: grab;
        }

        .subject-item:active {
            cursor: grabbing;
        }

        .subject-item button {
            width: auto;
            padding: 8px 12px;
            margin: 0 0 0 5px;
            font-size: 14px;
        }

        .btn-edit {
            background-color: #2196F3;
        }

        .btn-delete {
            background-color: #f44336;
        }

        .sortable-ghost {
            background-color: #e3f2fd;
            opacity: 0.8;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }

        .empty-row td {
            color: #888;
            padding: 20px;
        }

        .filter-box {
            background: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .system-box {
            background: #e3f2fd;
            border: 1px solid #bbdefb;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .auth-message {
            text-align: center;
            font-weight: bold;
            color: #4CAF50;
            margin-bottom: 15px;
            padding: 10px;
            background-color: #e8f5e9;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- 메인 메뉴 -->
        <div id="mainMenu">
            <h1>소인수 강좌 시스템</h1>
            <p style="text-align: center; margin-bottom: 30px;">원하시는 메뉴를 선택해주세요.</p>
            <button class="btn-student" onclick="showSection('studentSection')">👨‍🎓 학생 소인수 과목 선택</button>
            <button class="btn-list" onclick="showSection('enrollmentListSection')">📋 신청 내역 확인 (관리자)</button>
            <button class="btn-admin" onclick="showSection('adminSection')">⚙️ 과목 환경설정 (관리자)</button>
        </div>

        <!-- 학생 섹션 -->
        <div id="studentSection" class="hidden">
            <button class="btn-back" onclick="resetStudentSection(); showSection('mainMenu')">🔙 메인 메뉴로 돌아가기</button>
            <h2>소인수 과목 신청</h2>

            <div id="step1Auth">
                <p style="text-align: center; color: #666; margin-bottom: 15px;">본인의 학번과 이름을 먼저 입력하여 인증해주세요.</p>
                <input type="text" id="studentId" placeholder="학번 5자리 (예: 10101)">
                <input type="text" id="studentName" placeholder="이름">
                <button class="btn-auth" onclick="verifyStudent()">🔍 학생 확인하기</button>
            </div>

            <div id="step2Subject" class="hidden">
                <div id="authSuccessMessage" class="auth-message"></div>
                <select id="subjectSelect"></select>
                <button class="btn-student" onclick="submitApplication()">✅ 최종 신청하기</button>
            </div>
        </div>

        <!-- 관리자: 환경설정 섹션 -->
        <div id="adminSection" class="hidden">
            <button class="btn-back" onclick="showSection('mainMenu')">🔙 메인 메뉴로 돌아가기</button>
            <h2>환경설정 (과목 및 시스템 관리)</h2>

            <!-- 시스템 기본 설정 (입학년도/학년 기준점) -->
            <div class="system-box">
                <h3 style="margin-top: 0; color: #1565C0;">⚙️ 시스템 기본 설정 (기준점 설정)</h3>
                <p style="font-size: 13px; color: #555; margin-bottom: 15px;">이곳에서 특정 학년의 입학년도를 기준으로 잡아주시면, 나머지 학년의
                    입학년도는 <strong>자동으로 계산되어</strong> 학생 명단을 대조합니다.</p>
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label style="font-weight: bold; font-size: 14px;">기준 입학년도:</label>
                        <input type="number" id="sysAdmissionYear" placeholder="예: 2026" style="margin-bottom: 10px;">
                    </div>
                    <div style="flex: 1;">
                        <label style="font-weight: bold; font-size: 14px;">기준 학년:</label>
                        <select id="sysTargetGrade" style="margin-bottom: 10px;">
                            <option value="1">1학년</option>
                            <option value="2">2학년</option>
                            <option value="3">3학년</option>
                        </select>
                    </div>
                </div>
                <button class="btn-admin"
                    style="background-color: #1976D2; margin-bottom: 0; padding: 12px; font-size: 16px;"
                    onclick="saveSystemSettings()">💾 시스템 설정 저장하기</button>
            </div>

            <!-- 보기 필터 -->
            <div class="filter-box">
                <label for="adminGradeFilter" style="font-weight: bold;">보기 필터 (학년):</label>
                <select id="adminGradeFilter" onchange="loadSubjects()" style="margin-bottom: 0; margin-top: 5px;">
                    <option value="1">1학년</option>
                    <option value="2">2학년</option>
                    <option value="3">3학년</option>
                </select>
            </div>

            <hr style="border: 1px solid #ddd; margin-bottom: 20px;">

            <h3>새 과목 추가</h3>
            <input type="text" id="subjectInput" placeholder="현재 필터링된 학년에 추가할 과목 이름">
            <button class="btn-admin" onclick="addSubject()">과목 추가하기</button>

            <h3 style="margin-top: 40px;">목록 (드래그하여 순서 변경)</h3>
            <p style="font-size: 14px; color: #666; text-align: center; margin-top: -10px;">항목을 위아래로 끌어서 이동한 후 반드시 저장
                버튼을 누르세요.</p>
            <button class="btn-save-order" onclick="saveOrder()">💾 변경된 순서 저장하기</button>

            <div id="subjectList"></div>
        </div>

        <!-- 관리자: 신청 내역 확인 섹션 -->
        <div id="enrollmentListSection" class="hidden">
            <button class="btn-back" onclick="showSection('mainMenu')">🔙 메인 메뉴로 돌아가기</button>
            <h2>📋 수강 신청 내역</h2>

            <button class="btn-excel" onclick="downloadExcel()">📥 엑셀 파일로 다운로드</button>

            <table id="enrollmentTable">
                <thead>
                    <tr>
                        <th>학번</th>
                        <th>이름</th>
                        <th>신청 과목</th>
                    </tr>
                </thead>
                <tbody id="enrollmentTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Supabase 설정
        const SUPABASE_URL = 'https://zfywndoukwuxseloxogj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpmeXduZG91a3d1eHNlbG94b2dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyODUwMTQsImV4cCI6MjA5ODg2MTAxNH0.0O8_67qBrYbdabQ-iwcs4HsMkhmXIBg-wlFpm3ZlCvw';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let sortableInstance = null;
        let verifiedStudentId = "";
        let verifiedStudentName = "";

        // [화면 전환 기능]
        function showSection(sectionId) {
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('studentSection').classList.add('hidden');
            document.getElementById('adminSection').classList.add('hidden');
            document.getElementById('enrollmentListSection').classList.add('hidden');

            document.getElementById(sectionId).classList.remove('hidden');

            if (sectionId === 'adminSection') {
                loadSystemSettings();
                loadSubjects();
            } else if (sectionId === 'enrollmentListSection') {
                loadEnrollments();
            }
        }

        // ---------------- [학생 기능] ----------------

        function resetStudentSection() {
            document.getElementById('step1Auth').classList.remove('hidden');
            document.getElementById('step2Subject').classList.add('hidden');
            document.getElementById('studentId').value = '';
            document.getElementById('studentName').value = '';
            document.getElementById('subjectSelect').innerHTML = '';
            verifiedStudentId = "";
            verifiedStudentName = "";
        }

        async function verifyStudent() {
            const sId = document.getElementById('studentId').value.trim();
            const sName = document.getElementById('studentName').value.trim();

            if (sId.length !== 5 || !sName) {
                alert("학번 5자리와 이름을 정확히 입력해주세요.");
                return;
            }

            // 1. 관리자가 설정한 시스템 기준(입학년도, 학년) 불러오기
            const { data: configData, error: configError } = await supabaseClient
                .from('app_config')
                .select('*')
                .eq('id', 1)
                .single();

            if (configError || !configData) {
                alert("시스템 환경설정이 완료되지 않았습니다. 관리자에게 문의하세요.");
                return;
            }

            // 입력받은 학번의 첫 번째 자리를 통해 학생의 학년 추출
            const studentGrade = parseInt(sId.charAt(0));

            if (isNaN(studentGrade) || studentGrade < 1 || studentGrade > 3) {
                alert("학번 형식이 올바르지 않습니다. (1, 2, 3학년 중 하나로 시작해야 합니다)");
                return;
            }

            // 기준 설정을 바탕으로 현재 학생의 입학년도를 자동 계산
            // 예: 기준 설정이 2026년 1학년일 때, 학번이 2학년(2로 시작)이면 2026 - (2 - 1) = 2025년도로 계산됨
            const expectedAdmissionYear = configData.admission_year - (studentGrade - configData.target_grade);
            const gradeColumn = `grade${studentGrade}_id`;

            // 2. students 테이블에서 계산된 입학년도와 학번, 이름을 교차 검증
            const { data: studentData, error: studentError } = await supabaseClient
                .from('students')
                .select('*')
                .eq('admission_year', expectedAdmissionYear)
                .eq('name', sName)
                .eq(gradeColumn, sId);

            if (studentError) {
                console.error("명단 확인 오류:", studentError);
                alert("학생 정보 확인 중 오류가 발생했습니다.");
                return;
            }

            if (!studentData || studentData.length === 0) {
                alert(`입력하신 정보(${expectedAdmissionYear}년도 입학, ${studentGrade}학년)와 일치하는 학생 명단이 없습니다. 오타가 없는지 확인해주세요.`);
                return;
            }

            // 인증 성공 시 변수 저장 및 화면 전환
            verifiedStudentId = sId;
            verifiedStudentName = sName;

            document.getElementById('step1Auth').classList.add('hidden');
            document.getElementById('step2Subject').classList.remove('hidden');
            document.getElementById('authSuccessMessage').innerText = `인증 완료: ${sName} 학생, 신청할 과목을 선택해주세요.`;

            // 확인된 학생의 학년에 맞는 과목만 불러오기
            loadSubjectsForStudent(studentGrade);
        }

        async function loadSubjectsForStudent(grade) {
            const subjectSelect = document.getElementById('subjectSelect');

            const { data, error } = await supabaseClient
                .from('settings')
                .select('*')
                .eq('grade', grade)
                .order('display_order', { ascending: true });

            if (error) {
                console.error("오류:", error);
                return;
            }

            subjectSelect.innerHTML = '';

            if (data.length === 0) {
                subjectSelect.innerHTML = '<option value="">등록된 과목이 없습니다.</option>';
            } else {
                data.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.subject_name;
                    option.innerText = item.subject_name;
                    subjectSelect.appendChild(option);
                });
            }
        }

        async function submitApplication() {
            const subject = document.getElementById('subjectSelect').value;

            if (!subject || subject === "등록된 과목이 없습니다.") {
                alert("신청할 과목을 올바르게 선택해주세요.");
                return;
            }

            const { error } = await supabaseClient.from('enrollments').insert([
                { student_id: verifiedStudentId, student_name: verifiedStudentName, subject_name: subject }
            ]);

            if (error) {
                alert("저장 중 오류가 발생했습니다.");
            } else {
                alert(`🎉 ${verifiedStudentName} 학생의 수강신청이 완료되었습니다!`);
                resetStudentSection();
                showSection('mainMenu');
            }
        }

        // ---------------- [환경설정(과목 관리 및 시스템 관리) 기능] ----------------

        async function loadSystemSettings() {
            const { data, error } = await supabaseClient
                .from('app_config')
                .select('*')
                .eq('id', 1)
                .single();

            if (data) {
                document.getElementById('sysAdmissionYear').value = data.admission_year;
                document.getElementById('sysTargetGrade').value = data.target_grade;
            }
        }

        async function saveSystemSettings() {
            const year = document.getElementById('sysAdmissionYear').value;
            const grade = document.getElementById('sysTargetGrade').value;

            if (!year) {
                alert("기준 입학년도를 정확히 입력해주세요.");
                return;
            }

            const { error } = await supabaseClient.from('app_config').upsert([
                { id: 1, admission_year: parseInt(year), target_grade: parseInt(grade) }
            ]);

            if (error) {
                alert("설정 저장 중 오류가 발생했습니다: " + error.message);
                console.error(error);
            } else {
                alert("시스템 기준 설정이 성공적으로 저장되었습니다.");
            }
        }

        async function loadSubjects() {
            const filterGrade = document.getElementById('adminGradeFilter').value;

            const { data, error } = await supabaseClient
                .from('settings')
                .select('*')
                .eq('grade', parseInt(filterGrade))
                .order('display_order', { ascending: true });

            if (error) {
                console.error("데이터 로드 오류:", error);
                return;
            }

            const list = document.getElementById('subjectList');
            list.innerHTML = '';

            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'subject-item';
                div.setAttribute('data-id', item.id);
                div.innerHTML = `
                <span><b>${item.grade}학년</b> - ${item.subject_name}</span>
                <div>
                    <button class="btn-edit" onclick="editSubject(${item.id}, '${item.subject_name}')">수정</button>
                    <button class="btn-delete" onclick="deleteSubject(${item.id})">삭제</button>
                </div>
            `;
                list.appendChild(div);
            });

            if (sortableInstance) {
                sortableInstance.destroy();
            }

            sortableInstance = new Sortable(list, {
                animation: 150,
                ghostClass: 'sortable-ghost'
            });
        }

        async function saveOrder() {
            const items = document.querySelectorAll('#subjectList .subject-item');
            const updates = [];

            items.forEach((item, index) => {
                const id = item.getAttribute('data-id');
                updates.push({ id: parseInt(id), display_order: index });
            });

            if (updates.length === 0) {
                alert("저장할 과목이 없습니다.");
                return;
            }

            try {
                await Promise.all(updates.map(u =>
                    supabaseClient.from('settings').update({ display_order: u.display_order }).eq('id', u.id)
                ));

                alert("과목 순서가 성공적으로 저장되었습니다!");
                loadSubjects();
            } catch (err) {
                console.error("순서 저장 중 오류:", err);
                alert("순서 저장 중 오류가 발생했습니다.");
            }
        }

        async function addSubject() {
            const grade = document.getElementById('adminGradeFilter').value;
            const subjectName = document.getElementById('subjectInput').value;

            if (!subjectName) {
                alert("과목 이름을 입력해주세요.");
                return;
            }

            const { error } = await supabaseClient.from('settings').insert([
                { grade: parseInt(grade), subject_name: subjectName, display_order: 999 }
            ]);

            if (!error) {
                document.getElementById('subjectInput').value = '';
                loadSubjects();
            } else {
                console.error(error);
                alert("과목 추가 실패");
            }
        }

        async function deleteSubject(id) {
            if (confirm("삭제하시겠습니까?")) {
                await supabaseClient.from('settings').delete().eq('id', id);
                loadSubjects();
            }
        }

        async function editSubject(id, oldName) {
            const newName = prompt("새로운 과목 이름을 입력하세요:", oldName);
            if (newName && newName !== oldName) {
                await supabaseClient.from('settings').update({ subject_name: newName }).eq('id', id);
                loadSubjects();
            }
        }

        // ---------------- [수강신청 내역 확인 기능] ----------------

        async function loadEnrollments() {
            const { data, error } = await supabaseClient
                .from('enrollments')
                .select('*')
                .order('student_id', { ascending: true });

            if (error) {
                alert("신청 내역을 불러오는데 실패했습니다.");
                console.error(error);
                return;
            }

            const tbody = document.getElementById('enrollmentTableBody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = '<tr class="empty-row"><td colspan="3">아직 신청한 학생이 없습니다.</td></tr>';
                return;
            }

            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                <td>${item.student_id}</td>
                <td>${item.student_name}</td>
                <td>${item.subject_name}</td>
            `;
                tbody.appendChild(tr);
            });
        }

        function downloadExcel() {
            const table = document.getElementById('enrollmentTable');
            const tbody = document.getElementById('enrollmentTableBody');

            if (tbody.innerText.includes('아직 신청한 학생이 없습니다.')) {
                alert("다운로드할 데이터가 없습니다.");
                return;
            }

            const workbook = XLSX.utils.table_to_book(table, { sheet: "신청명단" });
            XLSX.writeFile(workbook, '소인수강좌_신청명단.xlsx');
        }
    </script>
</body>

</html>
