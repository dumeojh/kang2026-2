<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>실시간 풀이 제출 현황판 (교사용)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.MathJax = { tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']] }, svg: { fontCache: 'global' } };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-svg.js" id="MathJax-script" async></script>

  <style>
    :root {
      --bg: #F3F5F8;
      --navy: #16233B;
      --navy-soft: #22334F;
      --ink: #1B2A3D;
      --slate: #64748B;
      --gold: #E3A008;
      --silver: #9AA5B1;
      --bronze: #B8703D;
      --red: #C0392B;
      --green: #2E7D32;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--ink);
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    /* ---------- 왼쪽: 제출 명단 (스코어보드) ---------- */
    .sidebar {
      width: 320px;
      flex-shrink: 0;
      background: var(--navy);
      color: #fff;
      display: flex;
      flex-direction: column;
    }

    .sidebar-head {
      padding: 18px 20px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .sidebar-head .label {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.1em;
      color: #9FB4D6;
      text-transform: uppercase;
    }

    .sidebar-head .count {
      font-size: 26px;
      font-weight: 900;
      margin-top: 4px;
    }

    .sub-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
    }

    .sub-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 12px;
      border-radius: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      background: var(--navy-soft);
      transition: background 0.15s ease;
    }

    .sub-item:hover {
      background: #2B3F60;
    }

    .sub-item.selected {
      background: #34517A;
    }

    .sub-item .rank {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 13px;
      flex-shrink: 0;
    }

    .sub-item.rank-1 .rank {
      background: var(--gold);
      color: #16233B;
    }

    .sub-item.rank-2 .rank {
      background: var(--silver);
      color: #16233B;
    }

    .sub-item.rank-3 .rank {
      background: var(--bronze);
      color: #16233B;
    }

    .sub-item .name {
      font-weight: 700;
      font-size: 15px;
      flex: 1;
    }

    .sub-item .time {
      font-size: 12px;
      color: #B9C6DE;
    }

    .empty-msg {
      color: #9FB4D6;
      font-size: 13.5px;
      padding: 20px 10px;
      text-align: center;
    }

    /* ---------- 오른쪽: 문제 + 풀이 ---------- */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 28px;
      background: #fff;
      border-bottom: 2px solid var(--navy);
    }

    .topbar h1 {
      font-size: 16px;
      margin: 0;
      font-weight: 900;
      margin-right: auto;
    }

    .timer {
      font-size: 30px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      color: var(--navy);
      padding: 4px 16px;
      border-radius: 8px;
      background: #EAF0FA;
    }

    .timer.warning {
      color: #fff;
      background: var(--red);
    }

    .btn {
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 700;
      font-size: 13.5px;
      padding: 9px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--navy);
      background: #fff;
      color: var(--navy);
      cursor: pointer;
    }

    .btn:hover {
      background: var(--navy);
      color: #fff;
    }

    .btn.danger {
      border-color: var(--red);
      color: var(--red);
    }

    .btn.danger:hover {
      background: var(--red);
      color: #fff;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 26px 34px;
    }

    .problem-card {
      background: #fff;
      border: 1px solid rgba(22, 35, 59, 0.12);
      border-radius: 10px;
      padding: 22px 26px;
      margin-bottom: 22px;
      box-shadow: 0 6px 18px -10px rgba(22, 35, 59, 0.2);
    }

    .problem-card .ptag {
      font-size: 11.5px;
      font-weight: 900;
      letter-spacing: 0.06em;
      color: var(--slate);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .problem-card .ptext {
      font-size: 19px;
      line-height: 1.6;
    }

    .no-problem {
      text-align: center;
      color: var(--slate);
      padding: 80px 20px;
      font-size: 16px;
    }

    .solution-view {
      background: #fff;
      border: 1px solid rgba(22, 35, 59, 0.12);
      border-radius: 10px;
      padding: 24px 28px;
      min-height: 260px;
    }

    .solution-view .sv-head {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 14px;
      border-bottom: 1px dashed rgba(22, 35, 59, 0.2);
      padding-bottom: 12px;
    }

    .solution-view .sv-name {
      font-size: 20px;
      font-weight: 900;
    }

    .solution-view .sv-time {
      font-size: 13px;
      color: var(--slate);
    }

    .solution-view .sv-body {
      font-size: 17px;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .solution-placeholder {
      color: var(--slate);
      text-align: center;
      padding: 60px 10px;
      font-size: 15px;
    }

    /* ---------- 새 문제 출제 모달 ---------- */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(22, 35, 59, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
    }

    .modal-backdrop.hidden {
      display: none;
    }

    .modal-box {
      background: #fff;
      border-radius: 12px;
      padding: 28px 30px;
      width: min(560px, 92vw);
      box-shadow: 0 20px 50px -20px rgba(0, 0, 0, 0.4);
    }

    .modal-box h2 {
      margin: 0 0 16px;
      font-size: 18px;
    }

    .modal-box label {
      display: block;
      font-size: 12.5px;
      font-weight: 700;
      color: var(--slate);
      margin-bottom: 6px;
    }

    .modal-box textarea,
    .modal-box input,
    .modal-box select {
      width: 100%;
      font-size: 14.5px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(22, 35, 59, 0.25);
      margin-bottom: 16px;
      font-family: inherit;
      background: #fff;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .modal-box label.answer-label-lg {
      font-size: 16px;
      margin-bottom: 10px;
    }

    .modal-box textarea.answer-textarea-lg {
      font-size: 18px;
      line-height: 1.5;
      padding: 14px 16px;
      min-height: 110px;
    }

    /* ---------- 문제 은행 ---------- */
    .bank-filter-tabs {
      display: flex;
      gap: 6px;
      margin: 14px 0 10px;
      flex-wrap: wrap;
    }

    .filter-tab {
      border: 1px solid rgba(22, 35, 59, 0.2);
      background: #fff;
      color: var(--slate);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 999px;
      cursor: pointer;
    }

    .filter-tab.active {
      background: var(--navy);
      color: #fff;
      border-color: var(--navy);
    }

    .cat-badge {
      display: inline-block;
      font-size: 11.5px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      margin-right: 6px;
    }

    .cat-badge.cat-suneung {
      background: #E5EDFF;
      color: #2C4CBB;
    }

    .cat-badge.cat-textbook {
      background: #E4F6E9;
      color: #227A46;
    }

    .cat-badge.cat-other {
      background: #EFEFF2;
      color: #5B5F6B;
    }

    .bank-list {
      margin-top: 16px;
      max-height: 46vh;
      overflow-y: auto;
    }

    .bank-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid rgba(22, 35, 59, 0.12);
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .bank-item-main {
      flex: 1;
      min-width: 0;
    }

    .bank-title {
      font-weight: 700;
      font-size: 14.5px;
      margin-bottom: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bank-meta {
      font-size: 12px;
      color: var(--slate);
    }

    .bank-item-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .bank-item-actions .btn {
      padding: 7px 12px;
      font-size: 12.5px;
    }

    .bank-empty {
      text-align: center;
      color: var(--slate);
      padding: 30px 10px;
      font-size: 14px;
    }

    /* ---------- 정답 보기 ---------- */
    .answer-toggle-row {
      margin-top: 16px;
    }

    .btn.answer-btn {
      border-color: var(--gold);
      color: #8a6400;
    }

    .btn.answer-btn:hover {
      background: var(--gold);
      color: #fff;
    }

    .answer-panel {
      margin-top: 12px;
      background: #FFF8E6;
      border: 1.5px dashed var(--gold);
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 16px;
      line-height: 1.6;
    }

    .answer-panel.hidden {
      display: none;
    }

    .answer-panel .a-label {
      font-size: 11.5px;
      font-weight: 900;
      letter-spacing: 0.06em;
      color: #8a6400;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* ---------- 학생 풀이 전체화면으로 보여주기 ---------- */
    .sv-head-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .present-overlay {
      position: fixed;
      inset: 0;
      z-index: 900;
      background: #fff;
      display: flex;
      flex-direction: column;
    }

    .present-overlay.hidden {
      display: none;
    }

    .present-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 30px;
      border-bottom: 2px solid var(--navy);
      flex-shrink: 0;
    }

    .present-header .p-name {
      font-size: 24px;
      font-weight: 900;
      margin-right: auto;
    }

    .present-header .p-time {
      font-size: 14px;
      color: var(--slate);
    }

    .present-body {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
    }

    .present-body img {
      max-width: 100%;
      max-height: 72vh;
      border: 1px solid rgba(22, 35, 59, 0.15);
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .present-body .p-note {
      font-size: 22px;
      line-height: 1.7;
      white-space: pre-wrap;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="label">제출 명단 · 먼저 올린 순서</div>
        <div class="count" id="subCount">0명 제출</div>
      </div>
      <div class="sub-list" id="subList">
        <div class="empty-msg">아직 제출한 학생이 없습니다.</div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <h1 id="problemLabel">오늘의 문제</h1>
        <div class="timer" id="timerDisplay">--:--</div>
        <button class="btn" onclick="openBankModal()">📚 문제 은행</button>
        <button class="btn" onclick="openArchiveModal()">🗑 기록 관리</button>
        <button class="btn" onclick="openNewProblemModal()">＋ 새 문제 출제</button>
        <button class="btn danger" onclick="closeActiveProblem()">■ 마감하기</button>
      </div>

      <div class="content">
        <div id="problemArea"></div>
        <div class="solution-view" id="solutionView">
          <div class="solution-placeholder">왼쪽 명단에서 학생 이름을 클릭하면 풀이 과정이 여기에 표시됩니다.</div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-backdrop hidden" id="newProblemModal">
    <div class="modal-box">
      <h2 id="newProblemModalTitle">📝 새 문제 만들기</h2>
      <label>제목 (선택 — 은행 목록에서 알아보기 쉽게)</label>
      <input id="newProblemTitle" type="text" placeholder="예: 접선과 정적분 활용">
      <label>분류</label>
      <select id="newProblemCategory">
        <option value="수능특강">수능특강</option>
        <option value="교과서">교과서</option>
        <option value="기타문제">기타문제</option>
      </select>
      <label>문제 본문 (LaTeX은 $...$ 로 감싸서 입력)</label>
      <textarea id="newProblemText" rows="4" placeholder="문제를 입력하세요"></textarea>
      <label>제한시간 (분)</label>
      <input id="newProblemMinutes" type="number" value="5" min="1" max="60">
      <label class="answer-label-lg">정답 (선택 — "정답 보기" 버튼으로 원할 때만 공개)</label>
      <textarea id="newProblemAnswer" class="answer-textarea-lg" rows="4" placeholder="예: 27/4"></textarea>
      <div class="modal-actions">
        <button class="btn" onclick="closeNewProblemModal()">취소</button>
        <button class="btn" onclick="saveToBankOnly()">💾 은행에 저장</button>
        <button class="btn" style="background:var(--navy); color:#fff;" onclick="saveAndIssue()">🚀 저장하고 출제</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop hidden" id="bankModal">
    <div class="modal-box" style="width:min(640px, 92vw);">
      <h2>📚 문제 은행</h2>
      <button class="btn" onclick="closeBankModal(); openNewProblemModal();">＋ 새 문제 만들기</button>
      <div class="bank-filter-tabs" id="bankFilterTabs">
        <button class="filter-tab active" data-cat="전체" onclick="setBankFilter('전체')">전체</button>
        <button class="filter-tab" data-cat="수능특강" onclick="setBankFilter('수능특강')">수능특강</button>
        <button class="filter-tab" data-cat="교과서" onclick="setBankFilter('교과서')">교과서</button>
        <button class="filter-tab" data-cat="기타문제" onclick="setBankFilter('기타문제')">기타문제</button>
      </div>
      <div class="bank-list" id="bankList"></div>
      <div class="modal-actions">
        <button class="btn" onclick="closeBankModal()">닫기</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop hidden" id="archiveModal">
    <div class="modal-box" style="width:min(680px, 92vw);">
      <h2>🗑 제출 기록 관리</h2>
      <div class="bank-meta" id="archiveSummary" style="margin-bottom:14px;">불러오는 중...</div>

      <div
        style="display:flex; align-items:center; gap:8px; margin-bottom:14px; padding:12px; background:#F6F7FA; border-radius:8px;">
        <span style="font-size:13px; color:var(--slate); white-space:nowrap;">아래 기간보다 오래된 기록 한꺼번에 삭제:</span>
        <input id="archiveCutoffDays" type="number" value="30" min="1"
          style="width:70px; padding:6px 8px; border-radius:6px; border:1px solid rgba(22,35,59,0.25);">
        <span style="font-size:13px; color:var(--slate);">일</span>
        <button class="btn danger" style="margin-left:auto;" onclick="bulkDeleteOldProblems()">일괄 삭제</button>
      </div>

      <div class="bank-list" id="archiveList"></div>
      <div class="modal-actions">
        <button class="btn" onclick="closeArchiveModal()">닫기</button>
      </div>
    </div>
  </div>

  <div class="present-overlay hidden" id="presentOverlay"></div>

  <script>
    const SUPABASE_URL = 'https://zfywndoukwuxseloxogj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpmeXduZG91a3d1eHNlbG94b2dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyODUwMTQsImV4cCI6MjA5ODg2MTAxNH0.0O8_67qBrYbdabQ-iwcs4HsMkhmXIBg-wlFpm3ZlCvw';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let activeProblem = null;   // 현재 활성 문제 row
    let submissions = [];       // 현재 문제에 대한 제출 목록 (제출시각 순)
    let selectedStudentId = null;
    let timerInterval = null;
    let realtimeChannel = null;

    async function init() {
      const { data } = await supabaseClient
        .from('live_problems')
        .select('*')
        .eq('is_active', true)
        .order('started_at', { ascending: false })
        .limit(1);

      if (data && data.length > 0) {
        setActiveProblem(data[0]);
      } else {
        renderNoProblem();
      }
    }

    function renderNoProblem() {
      activeProblem = null;
      document.getElementById('problemLabel').textContent = '오늘의 문제';
      document.getElementById('timerDisplay').textContent = '--:--';
      document.getElementById('problemArea').innerHTML = `<div class="no-problem">아직 출제된 문제가 없습니다. "＋ 새 문제 출제"를 눌러 시작하세요.</div>`;
      document.getElementById('subList').innerHTML = `<div class="empty-msg">아직 제출한 학생이 없습니다.</div>`;
      document.getElementById('subCount').textContent = '0명 제출';
      clearInterval(timerInterval);
    }

    function setActiveProblem(problem) {
      activeProblem = problem;
      selectedStudentId = null;
      document.getElementById('problemLabel').textContent = `문제 #${problem.id}`;
      document.getElementById('problemArea').innerHTML = `
    <div class="problem-card">
      <div class="ptag">오늘의 문제 · 제한시간 ${Math.round(problem.time_limit_seconds / 60)}분</div>
      <div class="ptext">${problem.problem_text}</div>
      ${problem.answer_text ? `
      <div class="answer-toggle-row">
        <button class="btn answer-btn" id="answerToggleBtn" onclick="toggleAnswer()">🔑 정답 보기</button>
      </div>
      <div class="answer-panel hidden" id="answerPanel">
        <div class="a-label">정답</div>
        <div id="answerBody">${problem.answer_text}</div>
      </div>
      ` : ''}
    </div>
  `;
      if (window.MathJax) MathJax.typesetPromise();

      clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 1000);
      updateTimer();

      loadSubmissions();
      subscribeRealtime();
    }

    function toggleAnswer() {
      const panel = document.getElementById('answerPanel');
      const btn = document.getElementById('answerToggleBtn');
      if (!panel) return;
      const nowHidden = panel.classList.toggle('hidden');
      btn.textContent = nowHidden ? '🔑 정답 보기' : '🙈 정답 숨기기';
      if (!nowHidden && window.MathJax) MathJax.typesetPromise([panel]);
    }

    function updateTimer() {
      if (!activeProblem) return;
      const started = new Date(activeProblem.started_at).getTime();
      const remain = Math.max(0, Math.floor((started + activeProblem.time_limit_seconds * 1000 - Date.now()) / 1000));
      const m = String(Math.floor(remain / 60)).padStart(2, '0');
      const s = String(remain % 60).padStart(2, '0');
      const el = document.getElementById('timerDisplay');
      el.textContent = `${m}:${s}`;
      el.classList.toggle('warning', remain <= 30);
      if (remain <= 0) clearInterval(timerInterval);
    }

    async function loadSubmissions() {
      if (!activeProblem) return;
      const { data } = await supabaseClient
        .from('live_submissions')
        .select('*')
        .eq('session_id', activeProblem.id)
        .order('submitted_at', { ascending: true });

      submissions = data || [];
      renderSubList();
    }

    function renderSubList() {
      const list = document.getElementById('subList');
      document.getElementById('subCount').textContent = `${submissions.length}명 제출`;

      if (submissions.length === 0) {
        list.innerHTML = `<div class="empty-msg">아직 제출한 학생이 없습니다.</div>`;
        return;
      }

      const started = activeProblem ? new Date(activeProblem.started_at).getTime() : 0;

      list.innerHTML = submissions.map((s, idx) => {
        const rank = idx + 1;
        const elapsedSec = Math.max(0, Math.round((new Date(s.submitted_at).getTime() - started) / 1000));
        const m = String(Math.floor(elapsedSec / 60)).padStart(2, '0');
        const sec = String(elapsedSec % 60).padStart(2, '0');
        const rankClass = rank <= 3 ? ` rank-${rank}` : '';
        const selClass = s.student_id === selectedStudentId ? ' selected' : '';
        return `
      <div class="sub-item${rankClass}${selClass}" onclick="selectStudent('${s.student_id}')">
        <div class="rank">${rank}</div>
        <div class="name">${s.student_name}</div>
        <div class="time">${m}:${sec}</div>
      </div>
    `;
      }).join('');
    }

    function selectStudent(studentId) {
      selectedStudentId = studentId;
      const s = submissions.find(x => x.student_id === studentId);
      renderSubList();
      if (!s) return;

      document.getElementById('solutionView').innerHTML = `
    <div class="sv-head sv-head-row">
      <div class="sv-name">${s.student_name} (${s.student_id})</div>
      <div class="sv-time">제출: ${new Date(s.submitted_at).toLocaleTimeString('ko-KR')}</div>
      <button class="btn" style="margin-left:auto;" onclick="openPresentOverlay('${studentId}')">🖥 학생들에게 크게 보여주기</button>
    </div>
    ${s.solution_image ? `<img src="${s.solution_image}" alt="풀이 이미지" style="max-width:100%; border:1px solid rgba(22,35,59,0.15); border-radius:8px; margin-bottom:14px; display:block;">` : ''}
    ${s.solution_text ? `<div class="sv-body">${escapeHtml(s.solution_text)}</div>` : ''}
  `;
      if (window.MathJax) MathJax.typesetPromise([document.getElementById('solutionView')]);
    }

    function openPresentOverlay(studentId) {
      const s = submissions.find(x => x.student_id === studentId);
      if (!s) return;

      const overlay = document.getElementById('presentOverlay');
      overlay.innerHTML = `
    <div class="present-header">
      <div class="p-name">${s.student_name} (${s.student_id})</div>
      <div class="p-time">제출: ${new Date(s.submitted_at).toLocaleTimeString('ko-KR')}</div>
      <button class="btn" onclick="closePresentOverlay()">✕ 닫기 (Esc)</button>
    </div>
    <div class="present-body">
      ${s.solution_image ? `<img src="${s.solution_image}" alt="풀이 이미지">` : ''}
      ${s.solution_text ? `<div class="p-note">${escapeHtml(s.solution_text)}</div>` : ''}
    </div>
  `;
      overlay.classList.remove('hidden');
      if (window.MathJax) MathJax.typesetPromise([overlay]);
    }

    function closePresentOverlay() {
      document.getElementById('presentOverlay').classList.add('hidden');
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !document.getElementById('presentOverlay').classList.contains('hidden')) {
        closePresentOverlay();
      }
    });

    function escapeHtml(str) {
      return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function subscribeRealtime() {
      if (realtimeChannel) supabaseClient.removeChannel(realtimeChannel);
      if (!activeProblem) return;

      realtimeChannel = supabaseClient.channel(`submissions-${activeProblem.id}`)
        .on('postgres_changes', {
          event: '*', schema: 'public', table: 'live_submissions',
          filter: `session_id=eq.${activeProblem.id}`
        }, () => {
          loadSubmissions();
        })
        .subscribe();
    }

    let editingBankId = null; // 지금 문제 은행에서 수정 중인 항목의 id (새로 만드는 중이면 null)

    function openNewProblemModal() {
      editingBankId = null;
      document.getElementById('newProblemModalTitle').textContent = '📝 새 문제 만들기';
      document.getElementById('newProblemTitle').value = '';
      document.getElementById('newProblemCategory').value = '수능특강';
      document.getElementById('newProblemText').value = '';
      document.getElementById('newProblemMinutes').value = 5;
      document.getElementById('newProblemAnswer').value = '';
      document.getElementById('newProblemModal').classList.remove('hidden');
    }

    function openEditBankModal(id) {
      const row = bankRows.find(r => r.id === id);
      if (!row) return;
      editingBankId = id;
      document.getElementById('newProblemModalTitle').textContent = '✏️ 문제 수정';
      document.getElementById('newProblemTitle').value = row.title || '';
      document.getElementById('newProblemCategory').value = row.category || '기타문제';
      document.getElementById('newProblemText').value = row.problem_text || '';
      document.getElementById('newProblemMinutes').value = Math.round((row.time_limit_seconds || 300) / 60);
      document.getElementById('newProblemAnswer').value = row.answer_text || '';
      document.getElementById('newProblemModal').classList.remove('hidden');
    }

    function closeNewProblemModal() {
      document.getElementById('newProblemModal').classList.add('hidden');
    }

    async function insertBankRow() {
      const title = document.getElementById('newProblemTitle').value.trim();
      const category = document.getElementById('newProblemCategory').value;
      const text = document.getElementById('newProblemText').value.trim();
      const minutes = parseFloat(document.getElementById('newProblemMinutes').value) || 5;
      const answer = document.getElementById('newProblemAnswer').value.trim();
      if (!text) { alert('문제 본문을 입력해주세요.'); return null; }

      const payload = {
        title: title || null,
        category: category,
        problem_text: text,
        time_limit_seconds: Math.round(minutes * 60),
        answer_text: answer || null
      };

      if (editingBankId) {
        const { data, error } = await supabaseClient
          .from('live_problem_bank')
          .update(payload)
          .eq('id', editingBankId)
          .select()
          .single();
        if (error) { alert('수정 중 오류가 발생했습니다: ' + error.message); return null; }
        return data;
      }

      const { data, error } = await supabaseClient.from('live_problem_bank').insert([payload]).select().single();
      if (error) { alert('저장 중 오류가 발생했습니다: ' + error.message); return null; }
      return data;
    }

    async function saveToBankOnly() {
      const wasEditing = !!editingBankId;
      const row = await insertBankRow();
      if (!row) return;
      editingBankId = null;
      closeNewProblemModal();
      if (wasEditing) {
        alert('✅ 수정한 내용을 저장했습니다.');
        openBankModal();
      } else {
        alert('📚 문제 은행에 저장했습니다. 필요할 때 "문제 은행"에서 골라 출제하세요.');
      }
    }

    async function saveAndIssue() {
      const row = await insertBankRow();
      if (!row) return;
      editingBankId = null;
      closeNewProblemModal();
      await issueFromBankRow(row);
    }

    async function issueFromBankRow(row) {
      // 이전에 켜져 있던 문제는 모두 마감 처리
      await supabaseClient.from('live_problems').update({ is_active: false }).eq('is_active', true);

      const { data, error } = await supabaseClient.from('live_problems').insert([{
        problem_text: row.problem_text,
        time_limit_seconds: row.time_limit_seconds,
        answer_text: row.answer_text || null,
        is_active: true,
        started_at: new Date().toISOString()
      }]).select().single();

      if (error) { alert('출제 중 오류가 발생했습니다: ' + error.message); return; }

      document.getElementById('solutionView').innerHTML = `<div class="solution-placeholder">왼쪽 명단에서 학생 이름을 클릭하면 풀이 과정이 여기에 표시됩니다.</div>`;
      setActiveProblem(data);
    }

    // ---------------- [문제 은행 목록] ----------------
    let bankRows = [];
    let bankFilterCategory = '전체';

    function categoryBadgeClass(category) {
      if (category === '수능특강') return 'cat-suneung';
      if (category === '교과서') return 'cat-textbook';
      return 'cat-other';
    }

    function setBankFilter(cat) {
      bankFilterCategory = cat;
      document.querySelectorAll('#bankFilterTabs .filter-tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.cat === cat);
      });
      renderBankList();
    }

    async function loadBank() {
      const { data, error } = await supabaseClient
        .from('live_problem_bank')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        document.getElementById('bankList').innerHTML = `<div class="bank-empty">문제 은행을 불러오지 못했습니다: ${error.message}</div>`;
        return;
      }
      bankRows = data || [];
      renderBankList();
    }

    function renderBankList() {
      const el = document.getElementById('bankList');
      const rows = bankFilterCategory === '전체'
        ? bankRows
        : bankRows.filter(r => (r.category || '기타문제') === bankFilterCategory);

      if (rows.length === 0) {
        el.innerHTML = `<div class="bank-empty">${bankRows.length === 0 ? '저장된 문제가 없습니다. "＋ 새 문제 만들기"로 첫 문제를 추가해보세요.' : '이 분류에는 저장된 문제가 없습니다.'}</div>`;
        return;
      }
      el.innerHTML = rows.map(row => {
        const label = row.title || row.problem_text.slice(0, 40) + (row.problem_text.length > 40 ? '…' : '');
        const dateStr = new Date(row.created_at).toLocaleDateString('ko-KR');
        const category = row.category || '기타문제';
        return `
      <div class="bank-item">
        <div class="bank-item-main">
          <div class="bank-title"><span class="cat-badge ${categoryBadgeClass(category)}">${escapeHtml(category)}</span>${escapeHtml(label)}</div>
          <div class="bank-meta">제한시간 ${Math.round(row.time_limit_seconds / 60)}분 · ${dateStr}${row.answer_text ? ' · 🔑 정답 있음' : ''}</div>
        </div>
        <div class="bank-item-actions">
          <button class="btn" style="background:var(--navy); color:#fff;" onclick="issueFromBankId(${row.id})">🚀 출제</button>
          <button class="btn" onclick="closeBankModal(); openEditBankModal(${row.id});">✏️ 수정</button>
          <button class="btn danger" onclick="deleteBankRow(${row.id})">🗑</button>
        </div>
      </div>
    `;
      }).join('');
    }

    function openBankModal() {
      bankFilterCategory = '전체';
      document.querySelectorAll('#bankFilterTabs .filter-tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.cat === '전체');
      });
      loadBank();
      document.getElementById('bankModal').classList.remove('hidden');
    }
    function closeBankModal() {
      document.getElementById('bankModal').classList.add('hidden');
    }

    async function issueFromBankId(id) {
      const row = bankRows.find(r => r.id === id);
      if (!row) return;
      closeBankModal();
      await issueFromBankRow(row);
    }

    async function deleteBankRow(id) {
      if (!confirm('이 문제를 은행에서 삭제할까요? (이미 출제된 문제 기록에는 영향 없습니다)')) return;
      const { error } = await supabaseClient.from('live_problem_bank').delete().eq('id', id);
      if (error) { alert('삭제 중 오류가 발생했습니다: ' + error.message); return; }
      loadBank();
    }

    // ---------------- [제출 기록 관리 / 정리] ----------------
    let archiveProblems = [];
    let archiveCounts = {};

    async function loadArchive() {
      const { data: probData, error: probError } = await supabaseClient
        .from('live_problems')
        .select('*')
        .order('started_at', { ascending: false });

      if (probError) {
        document.getElementById('archiveList').innerHTML = `<div class="bank-empty">기록을 불러오지 못했습니다: ${probError.message}</div>`;
        return;
      }

      // 제출 건수만 가볍게 집계 (이미지 데이터는 불러오지 않아서 트래픽이 적습니다)
      const { data: subIdRows } = await supabaseClient.from('live_submissions').select('session_id');

      archiveCounts = {};
      (subIdRows || []).forEach(r => {
        archiveCounts[r.session_id] = (archiveCounts[r.session_id] || 0) + 1;
      });

      archiveProblems = probData || [];
      renderArchiveList(subIdRows ? subIdRows.length : 0);
    }

    function renderArchiveList(totalSubs) {
      const estimatedKB = totalSubs * 15; // 학생 1건당 평균 약 15KB로 추정
      const estimatedText = estimatedKB >= 1024 ? `약 ${(estimatedKB / 1024).toFixed(1)}MB` : `약 ${estimatedKB}KB`;
      document.getElementById('archiveSummary').textContent =
        `문제 세션 ${archiveProblems.length}개 · 제출 기록 총 ${totalSubs}건 (${estimatedText} 추정)`;

      const list = document.getElementById('archiveList');
      if (archiveProblems.length === 0) {
        list.innerHTML = `<div class="bank-empty">출제된 기록이 없습니다.</div>`;
        return;
      }

      list.innerHTML = archiveProblems.map(p => {
        const label = p.problem_text.slice(0, 40) + (p.problem_text.length > 40 ? '…' : '');
        const dateStr = new Date(p.started_at).toLocaleString('ko-KR');
        const count = archiveCounts[p.id] || 0;
        const actionHtml = p.is_active
          ? `<span style="font-size:12px; color:var(--green); font-weight:700;">진행중</span>`
          : `<button class="btn danger" onclick="deleteProblemRecord(${p.id})">🗑 삭제</button>`;
        return `
      <div class="bank-item">
        <div class="bank-item-main">
          <div class="bank-title">${escapeHtml(label)}</div>
          <div class="bank-meta">${dateStr} · 제출 ${count}건</div>
        </div>
        <div class="bank-item-actions">${actionHtml}</div>
      </div>
    `;
      }).join('');
    }

    function openArchiveModal() {
      document.getElementById('archiveSummary').textContent = '불러오는 중...';
      document.getElementById('archiveList').innerHTML = '';
      loadArchive();
      document.getElementById('archiveModal').classList.remove('hidden');
    }
    function closeArchiveModal() {
      document.getElementById('archiveModal').classList.add('hidden');
    }

    async function deleteProblemRecord(id) {
      const count = archiveCounts[id] || 0;
      if (!confirm(`이 문제와 제출 기록 ${count}건을 삭제할까요? 되돌릴 수 없습니다.`)) return;

      const { error } = await supabaseClient.from('live_problems').delete().eq('id', id);
      if (error) { alert('삭제 중 오류가 발생했습니다: ' + error.message); return; }
      loadArchive();
    }

    async function bulkDeleteOldProblems() {
      const days = parseFloat(document.getElementById('archiveCutoffDays').value) || 30;
      const cutoff = new Date(Date.now() - days * 24 * 60 * 60 * 1000);

      const targets = archiveProblems.filter(p => !p.is_active && new Date(p.started_at) < cutoff);
      if (targets.length === 0) {
        alert(`${days}일보다 오래된 삭제 대상 기록이 없습니다.`);
        return;
      }
      const totalSubs = targets.reduce((sum, p) => sum + (archiveCounts[p.id] || 0), 0);
      if (!confirm(`${days}일보다 오래된 문제 ${targets.length}개와 제출 기록 ${totalSubs}건을 삭제할까요? 되돌릴 수 없습니다.`)) return;

      const ids = targets.map(p => p.id);
      const { error } = await supabaseClient.from('live_problems').delete().in('id', ids);
      if (error) { alert('삭제 중 오류가 발생했습니다: ' + error.message); return; }

      alert('정리가 완료되었습니다.');
      loadArchive();
    }

    async function closeActiveProblem() {
      if (!activeProblem) return;
      if (!confirm('현재 문제를 마감할까요? 학생들은 더 이상 이 문제에 제출할 수 없습니다.')) return;
      await supabaseClient.from('live_problems').update({ is_active: false }).eq('id', activeProblem.id);
      renderNoProblem();
      if (realtimeChannel) supabaseClient.removeChannel(realtimeChannel);
    }

    init();
  </script>
</body>

</html>
