<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안성여고 소인수 강좌 신청 (학생용)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1, h2 {
            text-align: center;
            color: #2c3e50;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: white;
            transition: 0.3s;
        }

        .btn-student {
            background-color: #4CAF50;
        }

        .btn-auth {
            background-color: #03A9F4;
        }

        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .input-group label {
            width: 60px;
            font-weight: bold;
            font-size: 16px;
            color: #333;
        }

        .input-group input,
        .input-group select {
            flex: 1;
            margin-bottom: 0;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .hidden {
            display: none;
        }

        .auth-message {
            text-align: center;
            font-weight: bold;
            color: #4CAF50;
            margin-bottom: 15px;
            padding: 10px;
            background-color: #e8f5e9;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>👨‍🎓 소인수 과목 신청</h1>

        <div id="step1Auth">
            <p style="text-align: center; color: #666; margin-bottom: 15px;">본인의 학번과 이름을 먼저 입력하여 인증해주세요.</p>

            <div class="input-group">
                <label for="studentId">학번</label>
                <input type="text" id="studentId" placeholder="학번 5자리 (예: 10101)">
            </div>
            <div class="input-group">
                <label for="studentName">이름</label>
                <input type="text" id="studentName" placeholder="이름">
            </div>

            <button class="btn-auth" onclick="verifyStudent()">🔍 학생 확인하기</button>
        </div>

        <div id="step2Subject" class="hidden">
            <div id="authSuccessMessage" class="auth-message"></div>

            <div class="input-group">
                <label for="subjectSelect">과목</label>
                <select id="subjectSelect"></select>
            </div>

            <button class="btn-student" id="btnSubmitApp" onclick="submitApplication()">✅ 최종 신청하기</button>
            <button class="btn-auth" style="background-color:#9e9e9e;" onclick="resetStudentSection()">🔙 다시 인증하기</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://zfywndoukwuxseloxogj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpmeXduZG91a3d1eHNlbG94b2dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyODUwMTQsImV4cCI6MjA5ODg2MTAxNH0.0O8_67qBrYbdabQ-iwcs4HsMkhmXIBg-wlFpm3ZlCvw';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let verifiedStudentId = "";
        let verifiedStudentName = "";
        let isUpdating = false;

        function resetStudentSection() {
            document.getElementById('step1Auth').classList.remove('hidden');
            document.getElementById('step2Subject').classList.add('hidden');
            document.getElementById('studentId').value = '';
            document.getElementById('studentName').value = '';
            document.getElementById('subjectSelect').innerHTML = '';
            document.getElementById('btnSubmitApp').innerText = '✅ 최종 신청하기';
            verifiedStudentId = "";
            verifiedStudentName = "";
            isUpdating = false;
        }

        async function verifyStudent() {
            const sId = document.getElementById('studentId').value.trim();
            const sName = document.getElementById('studentName').value.trim();

            if (sId.length !== 5 || !sName) {
                alert("학번 5자리와 이름을 정확히 입력해주세요.");
                return;
            }

            const { data: configData, error: configError } = await supabaseClient
                .from('app_config')
                .select('*')
                .eq('id', 1)
                .single();

            if (configError || !configData) {
                alert("시스템 환경설정이 완료되지 않았습니다. 담당 선생님께 문의해주세요.");
                return;
            }

            const studentGrade = parseInt(sId.charAt(0));
            if (isNaN(studentGrade) || studentGrade < 1 || studentGrade > 3) {
                alert("학번 형식이 올바르지 않습니다. (1, 2, 3학년 중 하나로 시작해야 합니다)");
                return;
            }

            const expectedAdmissionYear = Number(configData.admission_year) - (studentGrade - Number(configData.target_grade));

            const { data: studentData, error: studentError } = await supabaseClient
                .from('students')
                .select('*')
                .or(`grade1_id.eq.${sId},grade2_id.eq.${sId},grade3_id.eq.${sId}`);

            if (studentError) {
                console.error("DB 조회 오류:", studentError);
                alert("데이터베이스 조회 중 오류가 발생했습니다: " + studentError.message);
                return;
            }

            if (!studentData || studentData.length === 0) {
                const { data: nameData } = await supabaseClient.from('students').select('*').eq('name', sName);
                if (nameData && nameData.length > 0) {
                    alert(`'${sName}' 학생은 명단에 존재하지만, 입력하신 학번(${sId})이 DB에 등록된 정보와 다릅니다. 확인해주세요.`);
                } else {
                    alert(`입력하신 학번(${sId})과 이름('${sName}') 모두 DB에서 찾을 수 없습니다.`);
                }
                return;
            }

            const inputNameClean = sName.replace(/\s+/g, '');
            const matchedStudent = studentData.find(s => s.name && s.name.replace(/\s+/g, '') === inputNameClean);

            if (!matchedStudent) {
                alert(`입력하신 학번(${sId})은 확인되나, 입력하신 이름('${sName}')과 DB에 등록된 이름이 다릅니다.`);
                return;
            }

            if (matchedStudent.admission_year && Number(matchedStudent.admission_year) !== expectedAdmissionYear) {
                alert(`[입학년도 불일치]\n입력하신 정보를 다시 확인해주세요. 계속 문제가 있으면 담당 선생님께 문의해주세요.`);
                return;
            }

            verifiedStudentId = sId;
            verifiedStudentName = matchedStudent.name;

            const { data: enrollData } = await supabaseClient
                .from('enrollments')
                .select('*')
                .eq('student_id', sId);

            if (enrollData && enrollData.length > 0) {
                const existingSubject = enrollData[0].subject_name;
                const wantUpdate = confirm(`이미 [ ${existingSubject} ] 과목을 신청하셨습니다.\n신청 내역을 수정하시겠습니까?`);

                if (!wantUpdate) {
                    resetStudentSection();
                    return;
                }

                isUpdating = true;
                document.getElementById('btnSubmitApp').innerText = '✅ 신청 수정하기';
                document.getElementById('authSuccessMessage').innerText = `인증 완료: ${matchedStudent.name} 학생 (기존 신청: ${existingSubject})`;
            } else {
                isUpdating = false;
                document.getElementById('btnSubmitApp').innerText = '✅ 최종 신청하기';
                document.getElementById('authSuccessMessage').innerText = `인증 완료: ${matchedStudent.name} 학생, 신청할 과목을 선택해주세요.`;
            }

            document.getElementById('step1Auth').classList.add('hidden');
            document.getElementById('step2Subject').classList.remove('hidden');

            loadSubjectsForStudent(studentGrade);
        }

        async function loadSubjectsForStudent(grade) {
            const subjectSelect = document.getElementById('subjectSelect');

            const { data, error } = await supabaseClient
                .from('settings')
                .select('*')
                .eq('grade', grade)
                .order('display_order', { ascending: true });

            if (error) {
                console.error("오류:", error);
                return;
            }

            subjectSelect.innerHTML = '';

            if (data.length === 0) {
                subjectSelect.innerHTML = '<option value="">등록된 과목이 없습니다.</option>';
            } else {
                data.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.subject_name;
                    option.innerText = item.subject_name;
                    subjectSelect.appendChild(option);
                });
            }
        }

        async function submitApplication() {
            const subject = document.getElementById('subjectSelect').value;

            if (!subject || subject === "등록된 과목이 없습니다.") {
                alert("신청할 과목을 올바르게 선택해주세요.");
                return;
            }

            if (isUpdating) {
                const { error } = await supabaseClient
                    .from('enrollments')
                    .update({ subject_name: subject, student_name: verifiedStudentName })
                    .eq('student_id', verifiedStudentId);

                if (error) {
                    alert("수정 중 오류가 발생했습니다.");
                } else {
                    alert(`🎉 ${verifiedStudentName} 학생의 수강신청이 성공적으로 수정되었습니다!`);
                    resetStudentSection();
                }
            } else {
                const { error } = await supabaseClient.from('enrollments').insert([
                    { student_id: verifiedStudentId, student_name: verifiedStudentName, subject_name: subject }
                ]);

                if (error) {
                    alert("저장 중 오류가 발생했습니다.");
                } else {
                    alert(`🎉 ${verifiedStudentName} 학생의 수강신청이 완료되었습니다!`);
                    resetStudentSection();
                }
            }
        }
    </script>
</body>

</html>
