<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>AI 기사 핵심 추출기</title>
    <script src="config.js"></script>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 600px;
            line-height: 1.6;
        }

        textarea {
            width: 100%;
            height: 150px;
            margin-bottom: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }

        button:hover {
            background-color: #0056b3;
        }

        #resultBox {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 5px;
            white-space: pre-wrap;
            min-height: 50px;
        }
    </style>
</head>

<body>

    <h2>기사 논리 뼈대 추출기</h2>
    <p>기사 내용을 아래에 붙여넣고 버튼을 누르면, AI가 불필요한 수식어를 덜어내고 <strong>'명사 -> 동사'</strong> 형태로 논리적인 뼈대만 추출합니다.</p>

    <textarea id="articleInput" placeholder="여기에 분석할 기사 내용을 붙여넣으세요..."></textarea>
    <button onclick="analyzeText()">명사-동사 추출하기</button>

    <div id="resultBox">이곳에 분석 결과가 표시됩니다.</div>

    <script>
        async function analyzeText() {
            const inputText = document.getElementById('articleInput').value;
            const resultBox = document.getElementById('resultBox');

            if (!inputText) {
                alert("기사 내용을 입력해 주세요.");
                return;
            }

            resultBox.innerText = "Gemini AI가 문맥을 분석하고 있습니다. 잠시만 기다려주세요...";

            // config.js 파일에서 불러온 키 (여기에는 키를 직접 적지 않습니다)
            const API_KEY = GEMINI_API_KEY;

            if (!API_KEY || API_KEY.trim() === "") {
                resultBox.innerText = "config.js에 API 키가 설정되지 않았습니다. config.js 파일을 확인해 주세요.";
                return;
            }

            // 최신 모델명으로 교체 (gemini-1.5-flash는 이미 서비스 종료됨)
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${API_KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: inputText + "\n\n위 기사에서 불필요한 수식어를 빼고 가장 핵심적인 명사와 동사만 뽑아서 '명사 -> 동사' 형태로 요약해 줘."
                            }]
                        }]
                    })
                });

                const data = await response.json();

                if (data.candidates && data.candidates.length > 0) {
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    resultBox.innerText = aiResponse;
                } else if (data.error) {
                    // 실제 오류 원인을 화면에 표시 (디버깅용)
                    resultBox.innerText = "오류: " + data.error.message;
                    console.error("API 응답 오류:", data);
                } else {
                    resultBox.innerText = "분석 결과를 가져오지 못했습니다.";
                    console.error("API 응답 오류:", data);
                }

            } catch (error) {
                resultBox.innerText = "오류가 발생했습니다: 네트워크 연결을 확인해 주세요.";
                console.error("통신 에러:", error);
            }
        }
    </script>
</body>

</html>
